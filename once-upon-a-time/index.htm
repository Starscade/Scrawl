<!DOCTYPE html>
<html lang="en"class="day"oncontextmenu="return false">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="theme-color"content="#ddd">
		<link rel="icon"href="../ico.png">
		<title>S c r a w l</title>
		<style>
			@font-face{
				font-family:'Font';
				src:url('../Baloo2.woff2');
			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--fg);
				border-radius:var(--rad);
				border:4pt solid var(--bg);
			}
			::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#333;
				--fg:#eca;
				--pt:18pt;
				--bord:2pt solid;
				--curs:/* url('data:image/svg+xml;utf8,<svg width="24" height="24" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M11.883 3.007 12 3a1 1 0 0 1 .993.883L13 4v7h7a1 1 0 0 1 .993.883L21 12a1 1 0 0 1-.883.993L20 13h-7v7a1 1 0 0 1-.883.993L12 21a1 1 0 0 1-.993-.883L11 20v-7H4a1 1 0 0 1-.993-.883L3 12a1 1 0 0 1 .883-.993L4 11h7V4a1 1 0 0 1 .883-.993L12 3l-.117.007Z" fill="Gray"/></svg>'), */crosshair;
				--curs-no:/* url('data:image/svg+xml;utf8,<svg width="24" height="24" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2Zm6.113 5.654-10.46 10.46a7.5 7.5 0 0 0 10.46-10.46ZM12 4.5a7.5 7.5 0 0 0-6.113 11.846l10.46-10.46A7.466 7.466 0 0 0 12 4.5Z" fill="Gray"/></svg>'), */not-allowed;
				--curs-poi:/* url('data:image/svg+xml;utf8,<svg width="24" height="24" fill="none" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path d="M7.921 2.3C6.936 1.532 5.5 2.234 5.5 3.482v17.009c0 1.422 1.795 2.046 2.677.93l4.19-5.3a1.65 1.65 0 0 1 1.295-.626h6.852c1.428 0 2.049-1.808.921-2.684L7.921 2.299Z" fill="Gray"/></svg>'), */pointer;
				--curs-txt:text;
				--font:'Font',sans-serif;
				--rad:calc(var(--pt)/3);
				--shado:0 -1em 1em var(--bg);
				background-color:var(--bg);
				color:var(--fg);
				cursor:var(--curs);
				font-family:var(--font);
				font-size:var(--pt);
				/* scroll-behavior:smooth; */
				text-align:center;
				user-select:none;
			}
			article{
				cursor:var(--curs-txt);
				line-height:150%;
				margin:10vh auto 10vh auto;
				max-width:8.5in;
				padding:1em;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			blockquote{
				text-align:center;
			}blockquote,body,h1,p{
				margin:0;
			}
			body{
				opacity:0;
				transition:1s opacity;
			}body:hover::-webkit-scrollbar-thumb{
				background-color:transparent;
			}
			h1{
				font-size:100%;
				font-weight:normal;
				text-align:center;
				text-transform:uppercase;
			}
			input{
				background-color:inherit;
				border:none;
				border-radius:var(--rad);
				color:inherit;
				display:block;
				font-family:inherit;
				font-size:inherit;
				margin:auto;
				padding:.5em;
			}input:focus{
				outline:none;
			}input[type="text"]{
				border-bottom:2pt solid;
				margin-bottom:1em;
			}
			nav{
				background-color:var(--bg);
				position:fixed;
			}nav span{
				cursor:var(--curs-poi);
				display:inline-block;
				height:1em;
				padding:1em;
				width:1em;
			}nav span:hover{
				background-color:var(--fg);
				color:var(--bg);
			}
			p:not(br+p){
				text-indent:2em;
			}
			svg{
				fill:currentColor;
				height:1em;
				width:1em;
			}
			.act{
				background-color:var(--fg);
				color:var(--bg);
			}
			.alurt{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
				cursor:var(--curs-poi);
				left:50%;
				min-width:6em;
				padding:.33em .66em .33em .66em;
				position:fixed;
				top:11%;
				transform:translateX(-50%);
				transition:opacity .5s;
				white-space:pre;
				z-index:10;
			}
			.day{
				--bg:#ddd;
				--fg:#667;
			}
			.glass{
				opacity:0;
			}
			.hid{
				display:none;
			}
			.lokc{
				cursor:var(--curs-no);
			}.lokc p{
				text-align:justify;
			}
			#contex{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
				display:none;
			}#contex div{
				display:none;
			}#contex span:hover{
				background-color:var(--bg);
				color:var(--fg);
			}#contex span:first-of-type:hover{
				border-radius:var(--rad) 0 0 var(--rad);
			}#contex span:last-of-type:hover{
				border-radius:0 var(--rad) var(--rad) 0;
			}
			#cuneiform{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
				left:50%;
				min-width:18em;
				padding:1em;
				top:33%;
				transform:translate(-50%,-50%);
			}#cuneiform div{
				margin-bottom:1em;
			}#cuneiform input{
				background-color:var(--bg);
				color:var(--fg);
				display:none;
				width:76%;
			}#cuneiform span{
				background-color:var(--bg);
				border:var(--bord) var(--bg);
				border-radius:var(--rad);
				color:var(--fg);
				padding:.5em 1em .5em 1em;
			}#cuneiform span:hover{
				background-color:var(--fg);
				color:var(--bg);
			}
			#moab{
				bottom:0;
				display:none;
				height:auto;
				top:auto;
				width:100%;
			}
			#tooble{
				bottom:0;
				box-shadow:var(--shado);
				display:flex;
				flex-direction:column;
				justify-content:space-between;
				overflow-y:scroll;
				top:0;
				transition:.33s opacity;
			}#tooble:hover{
				opacity:1;
			}#tooble div{
				display:inline;
			}#tooble span{
				border-radius:0 1em 1em 0;
				display:block;
			}
			#vign{
				background-image:linear-gradient(var(--bg) 2%,transparent 4%,transparent 96%,var(--bg) 98%);
				bottom:0;
				left:0;
				pointer-events:none;
				position:fixed;
				right:0;
				top:0;
			}
			@media(orientation:portrait){
				article{
					margin-bottom:4em;
					margin-top:1em;
				}
				nav span,nav span:hover,#contex{
					background-color:var(--bg);
					color:var(--fg);
				}
				#contex{
					bottom:3em;
					box-shadow:var(--shado);
					left:0;
					right:0;
				}#contex div{
					display:block;
				}
				#moab{
					display:block;
				}
				#tooble{
					bottom:3em;
					display:none;
					opacity:1;
					top:auto;
					width:100%;
				}#tooble.peek{
					display:block;
				}#tooble span{
					display:inline-block;
				}
				#vign{
					bottom:3em;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--pt:12pt;
					--font:serif;
				}
				article{
					line-height:200%;
					margin:0;
					padding:0;
				}
				h1{
					font-variant:small-caps;
					letter-spacing:1pt;
					text-transform:none;
				}
				nav,.alurt,#vign{
					display:none!important;
				}
			}
			@page{
				margin:1in;
			}
		</style>
	</head>

		<script>
			'use strict';
			// Scrawl
			class Jig{
				constructor(nib=new Nib()){
					this.CFG={'dark':false,'post_alias':'','post_url':'','promp':'	# ','thesaurus_url':'https://www.merriam-webster.com/thesaurus/','working_title':''};
					this.HAND=false;
					this.cfg=(ky,valu)=>{
						if(!localStorage.Scrawl_CFG){
							this.mem(this.CFG);
						}
						const cfg=this.mem();
						if(ky){
							if(valu!=null){
								cfg[ky]=valu;
								this.mem(cfg);
							}else{
								return cfg[ky];
							}
						}else{
							if(JSON.stringify(cfg)!==JSON.stringify(this.CFG)){
								Object.keys(this.CFG).forEach((i,x)=>{
									if(!(i in cfg)){
										cfg[i]=this.CFG[i];
									}
								});
								Object.keys(cfg).forEach((i,x)=>{
									if(!(i in this.CFG)){
										delete cfg[i];
									}
								});
								this.mem(cfg);
							}
							// console.log(cfg);
							return cfg;
						}
					}
					this.dl=(bob,naem='naem.txt')=>{
						const uri=window.URL.createObjectURL(bob);
						const a=document.createElement('a');
						document.body.appendChild(a);
						a.style='display:none';
						a.href=uri;
						a.download=naem;
						a.click();
						a.remove();
						window.URL.revokeObjectURL(uri);
					}
					this.gurl=async (bob='',naem=nib.sellama(),url=this.cfg('post_url'))=>{
						return await new Promise((ok,no)=>{
							const Formbody=new FormData();
							Formbody.append(0,bob,naem);
							fetch(url,{
								method:'POST',
								body:Formbody
							}).then(resp=>{
								ok(resp.text());
							}).catch(err=>{
								no('Failed');
							})
						});
						const Formbody=new FormData();
						Formbody.append(0,bob,naem);
						fetch(url,{
							method:'POST',
							body:Formbody
						}).then(
							resp=>resp.text()
						).then(
							resp=>{
								console.log(resp);
								return resp
							}
						);
					}
					this.lod=(F)=>{
						const raed=new FileReader();
						raed.readAsText(F);
						raed.onload=()=>{
							const dot=F['name'].split('.');
							if(dot[dot.length-1]=='md'){
								nib.memry(nib.x2y(nib.x2y(raed.result),'htm2md'));
							}else{
								nib.memry(nib.x2y(raed.result,'htm2md'));
							}
							this.cfg('post_alias','');
							this.cfg('working_title',F['name']);
							location.reload();
						}
					}
					this.mem=(json)=>{
						if(json){
							localStorage.Scrawl_CFG=JSON.stringify(json);
						}
						return JSON.parse(localStorage.Scrawl_CFG);
					}
					this.neu=()=>{
						nib.memry(this.cfg('promp'));
						this.cfg('post_alias','');
						this.cfg('working_title','');
						location.reload();
					}
					this.pub=async (issu)=>{
						return await new Promise((ok,no)=>{
							if(issu){
								if(issu===' '){
									issu=nib.sellama();
									this.cfg('post_alias','');
								}
								if(issu!==nib.sellama()){
									this.cfg('post_alias',issu);
								}
								if(this.cfg('post_url')){
									this.gurl(new Blob([nib.x2y()]),issu,this.cfg('post_url')).then(resp=>ok(resp)).catch(err=>console.log(err));
								}else{
									const boiler=['<!DOCTYPE html><html lang="en"><head><meta charset="utf-8"><meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width"><meta name="theme-color"content="#ddd"><link rel="icon"href="data:image/gif;base64,R0lGODlhAQABAIAAAAAAAP///yH5BAEAAAAALAAAAAABAAEAAAIBRAA7"><title>','</title><style>@font-face{font-family:\'Font\';src:url(\'https://scrawl.cc/Baloo2.woff2\');}@keyframes faed{from{opacity:0}to{opacity:1}}::-webkit-scrollbar{height:var(--rad)*2;width:var(--rad)*2;}::-webkit-scrollbar-thumb{background-color:var(--fg);border-radius:var(--rad);border:4pt solid var(--bg);}::selection{background-color:var(--fg);color:var(--bg);}:root{--bg:#ddd;--fg:#444;--pg:#eee;--pt:14pt;--font:\'Font\',sans-serif;--rad:calc(var(--pt)/3);background-color:var(--bg);color:var(--fg);cursor:crosshair;font-family:var(--font);font-size:var(--pt);scroll-behavior:smooth;scrollbar-width:thin;text-align:center;}a{color:currentColor;}article{background-color:var(--pg);cursor:text;line-height:150%;margin:auto;max-width:7.5in;padding:1em;}blockquote,body,p{margin:0;}body{animation:faed 1s forwards;}footer{margin:1em;opacity:.5;}h1{font-weight:normal;letter-spacing:2pt;text-transform:uppercase;}p{text-align:justify;}p:not(br+p){text-indent:2em;}@media(orientation:landscape){article{border-radius:var(--rad);margin:10vh auto 10vh auto;padding:1in;}}@media print{:root{--bg:White;--fg:Black;--pg:White;}article{padding:0}}@page{margin:1in;}</style></head><body><main><article>','</article><footer><small>Made with <a href="https://scrawl.cc/"target="_Blank">Scrawl</a></small></footer></main></body></html>'];
									const txt=boiler[0]+issu+boiler[1]+nib.x2y()+boiler[2];
									const bob=new Blob([txt],{type:'text/html;charset=utf-8'});
									this.dl(bob,issu+'.htm');
									ok('Downloading');
								}
							}
						});
					}
					this.sav=async (as=false)=>{
						return await new Promise((ok,no)=>{
							let naem=nib.sellama();
							if(this.cfg('working_title')){
								naem=this.cfg('working_title');
							}
							if('showSaveFilePicker'in window){
								if(as){
									this.HAND=false;
								}
								const that=this;
								(async function (naem,that){
									if(that.HAND===false){
										const ops={
											suggestedName:naem,
											excludeAcceptAllOption:true,
											types:[{
												description:'Markdown',
												accept:{
													'text/markdown':['.md']
												}
											},/* {
												description:'HTML',
												accept:{
													'text/html':['.htm']
												}
											}, */{
												description:'Plaintext',
												accept:{
													'text/plain':['.txt']
												}
											}]
										};
										that.HAND=await window.showSaveFilePicker(ops);
									}
									const f=await that.HAND.getFile();
									const fn=f.name.split('.');
									const fx=fn[fn.length-1];
									let txt;
									if(f.name){
										that.cfg('working_title',f.name);
									}
									switch(fx.toLowerCase()){
										/* case'htm':txt=nib.x2y();break; */
										case'md':txt=nib.x2y(nib.x2y(),'htm2md').replaceAll(/\t/g,'');break;
										default:txt=nib.x2y(nib.x2y(),'htm2md');
									}
									const maem={'htm':'text/html','md':'text/markdown','txt':'text/plain'};
									const bob=new Blob([txt],{type:maem[fx]+';charset=utf-8'});
									const pen=await that.HAND.createWritable();
									if(pen){
										await pen.write(bob);
										await pen.close();
									}
								})(naem,that).then(resp=>{
									ok('Saved');
								}).catch(err=>{
									no(err);
								});
							}else{
								const txt=nib.x2y(nib.x2y(),'htm2md').replace(/\t/g,'');
								const bob=new Blob([txt],{type:'text/markdown;charset=utf-8'});
								this.dl(bob,naem+'.md');
							}
						});
					}
					this.spex=()=>{
						if(nib.NOTEPAD.spellcheck==true){
							nib.NOTEPAD.setAttribute('spellcheck','false');
						}else{
							nib.NOTEPAD.setAttribute('spellcheck','true');
							/* nib.autypo(); */
						}
					}
					// INIT
					this.cfg();
					document.title=nib.sellama()+'*';
					if(this.cfg('working_title')){
						document.title=this.cfg('working_title')+'*';
					}
				}
			}
			class Nib{
				constructor(notepad=document.getElementsByTagName('article')[0]){
					this.NOTEPAD=notepad;
					this.NOTEPAD.contentEditable=true;
					this.NOTEPAD.spellcheck=false;
					this.HISTRY={'txt':[' '],'indx':0,'cart':[[0,0]]};
					this.RANG=[0,0];
					this.TYPO={"Aint":"Ain't","aint":"ain't",/*"Cant":"Can't","cant":"can't",*/"Couldnt":"Couldn't","couldnt":"couldn't","Didnt":"Didn't","didnt":"didn't","Dont":"Don't","dont":"don't","Doesnt":"Doesn't","doesnt":"doesn't","Hadnt":"Hadn't","hadnt":"hadn't","Hasnt":"Hasn't","hasnt":"hasn't","Havent":"Haven't","havent":"haven't","Hed":"He'd","hed":"he'd","Hes":"He's","hes":"he's","i":"I","Im":"I'm","i'm":"I'm","im":"I'm","Isnt":"Isn't","isnt":"isn't","Ive":"I've","ive":"I've","Mustnt":"Mustn't","mustnt":"mustn't","Mustve":"Must've","mustve":"must've","Shant":"Shan't","shant":"shan't","Shes":"She's","shes":"she's","Thats":"That's","thats":"that's","Theres":"There's","theres":"there's","Theyd":"They'd","theyd":"they'd","Theyll":"They'll","theyll":"they'll","Theyre":"They're","theyre":"they're","Theyve":"They've","theyve":"they've",/*"Twas":"'Twas","twas":"'twas",*/"Wasnt":"Wasn't","wasnt":"wasn't","Werent":"Weren't","werent":"weren't","Wheres":"Where's","wheres":"where's",/*"Wont":"Won't","wont":"won't",*/"Wouldnt":"Wouldn't",'wouldnt':"wouldn't","Youd":"You'd","youd":"you'd","Youll":"You'll","youll":"you'll","Youre":"You're","youre":"you're","Youve":"You've","youve":"you've"};
					this.autypo=(typo=this.TYPO)=>{
						let txt=this.NOTEPAD.textContent;
						Object.keys(typo).forEach(e=>{
							const regx=new RegExp("\\b"+e+"\\b",'g');
							txt=txt.replace(regx,typo[e]).replaceAll(/ +/g,' ');
						});
						if(this.NOTEPAD.textContent!=txt){
							this.NOTEPAD.textContent=txt;
							this.raec();
						}
						return txt;
					}
					this.biu=(g='*')=>{
						this.raec(this.grang());
						const rang=this.NOTEPAD.textContent.slice(this.RANG[0],this.RANG[1]);
						let txt;
						let keep_rang=false;
						if(rang.length>0){
							if(rang.startsWith(g)){
								if(rang===g){
									txt='';
								}else{
									txt=rang.substring(g.length,rang.length-g.length);
								}
							}else{
								txt=g+rang+g;
							}
						}else{
							txt=g;
							keep_rang=true;
						}
						this.xom(txt,keep_rang);
					}
					this.cart=(pos=null)=>{
						if(pos){
							this.RANG=[pos[0],pos[1]];
						}
						const selec=window.getSelection();
						const rang=document.createRange();
						rang.setStart(this.NOTEPAD.childNodes[0],this.RANG[0]);
						rang.setEnd(this.NOTEPAD.childNodes[0],this.RANG[1]);
						selec.removeAllRanges();
						selec.addRange(rang);
					}
					this.ccp=(mo='cut')=>{
						const selec=window.getSelection().toString();
						switch(mo){
							case'cut':this.raec();navigator.clipboard.writeText(selec);this.xom();break;
							case'get':navigator.clipboard.writeText(selec);break;
							case'put':this.raec();navigator.clipboard.readText().then(txt=>this.xom(txt,false));break;
						}
					}
					this.cop=(lang='HTML')=>{
						switch(lang){
							case'BBC':navigator.clipboard.writeText(this.x2y(this.x2y(),'htm2bbc'));break;
							case'HTML':navigator.clipboard.writeText(+this.x2y());break;
							case'MD':
							default:navigator.clipboard.writeText(String(this.x2y(this.x2y(),'htm2md')).replaceAll(/\t/g,"\n"));
						}
					}
					this.grang=()=>{
						const selec=document.getSelection().getRangeAt(0);
						return [selec.startOffset,selec.endOffset];
					}
					this.iswet=()=>{
						let x=false;
						if(this.NOTEPAD.contentEditable=='true'){
							x=true;
						}
						return x;
					}
					this.memry=(txt)=>{
						if(txt){
							localStorage.Scrawl_TXT=txt;
						}
						return localStorage.Scrawl_TXT;
					}
					this.mov=()=>{
						const rex=window.getSelection().getRangeAt(0).getClientRects()[0]['top'];
						const pos=Math.round(window.scrollY+rex)-(window.innerHeight/3);
						window.scrollTo(0,pos);
					}
					this.nix=(rec=true)=>{
						if(this.RANG[0]===this.RANG[1]){
							if(this.RANG[0]>0){
								this.RANG[0]--;
							}
						}
						this.xom('',true,rec);
					}
					this.preg=(matchbox)=>{
						let msg='Invalid';
						if(matchbox.trim()&&matchbox.includes('|')){
							if(this.iswet()){
								const w=matchbox.split('|');
								const rx=new RegExp('\\b'+w[0]+'\\b','g');
								const k=[...this.NOTEPAD.textContent.matchAll(rx)].length;
								if(k){
									this.raec();
									this.NOTEPAD.innerHTML=this.NOTEPAD.textContent.replaceAll(rx,w[1]);
									this.raec();
									msg=k;
								}
							}
						}
						return msg;
					}
					this.raec=(rang=this.RANG)=>{
						this.memry(this.NOTEPAD.textContent);
						if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
							let oldTxt=this.HISTRY['txt'].splice(this.HISTRY['indx']);
							let oldCart=this.HISTRY['cart'].splice(this.HISTRY['indx']);
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							oldTxt.pop();
							oldTxt.reverse();
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							oldCart.pop();
							oldCart.reverse();
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							this.HISTRY['indx']=this.HISTRY['txt'].length;
						}else{
							this.HISTRY['indx']++;
						}
						this.HISTRY['txt'][this.HISTRY['indx']]=this.NOTEPAD.textContent;
						this.HISTRY['cart'][this.HISTRY['indx']]=rang;
						if(this.HISTRY['txt'].length>99){
							this.HISTRY['txt'].shift();
							this.HISTRY['cart'].shift();
							this.HISTRY['indx']--;
						}
						if(document.title.slice(document.title.length-1)!=='*'){
							document.title+='*';
						}
						console.log('History: ',this.HISTRY);
					}
					this.sellama=(naem='Untitled')=>{
						const h1=this.memry().trim().split("\n")[0].trim();
						if(h1.startsWith('#')){
							const tyt=h1.replace(/#\s*(.*)/,'$1').replace(/\s+/g,' ')
							if(tyt!=''){
								naem=tyt;
							}
						}
						return naem;
					}
					this.selmod=(scope='word')=>{
						window.getSelection().modify('move','backward',scope);
						window.getSelection().modify('extend','forward',scope);
						const selec=window.getSelection();
						const rang=selec.getRangeAt(0);
						const nurang=document.createRange();
						let beg=0;
						let nd=0;
						if(selec.toString()[0]=='	'){
							beg=1;
						}
						if(selec.toString()[selec.toString().length-1]==' '){
							nd=1;
						}
						nurang.setStart(this.NOTEPAD.childNodes[0],rang.startOffset+beg);
						nurang.setEnd(this.NOTEPAD.childNodes[0],rang.endOffset-nd);
						selec.removeAllRanges();
						selec.addRange(nurang);
					}
					this.swop=()=>{
						if(this.iswet()){
							this.NOTEPAD.contentEditable=false;
							this.NOTEPAD.innerHTML=this.x2y();
						}else{
							this.NOTEPAD.contentEditable=true;
							this.NOTEPAD.textContent=this.memry();
							this.NOTEPAD.focus();
							this.cart();
						}
					}
					this.tally=()=>{
						let txt='';
						if(window.getSelection().toString().length>0){
							txt=this.x2y(window.getSelection().toString());
						}else{
							txt=this.x2y();
						}
						const wurdz=txt.split(/ +/).length;
						return wurdz;
					}
					this.undo=(re=false)=>{
						if(this.iswet()){
							let go=false;
							if(re){
								if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
									this.HISTRY['indx']++;
									go=true;
								}
							}else{
								if(this.HISTRY['indx']>1){
									this.HISTRY['indx']--;
									go=true;
								}
							}
							if(go){
								this.memry(this.HISTRY['txt'][this.HISTRY['indx']]);
								this.NOTEPAD.textContent=this.memry();
								this.cart(this.HISTRY['cart'][this.HISTRY['indx']]);
								this.mov();
							}
						}
					}
					this.x2y=(txt=this.memry(),patt='md2htm')=>{
						const REGX={'htm2bbc':[
							[
								/</g,
								/>/g,
								/strong\]/g,
								/em\]/g,
								/\[h1\](.*?)\[\/h1\]/g,
								/\[h3\]✶ ✶ ✶\[h3\]/g,
								/\[br\]/g,
								/\[p\]/g,
								/\[\/p\]/g
							],[
								'[',
								']',
								'b]',
								'i]',
								"[c]$1[/c]",
								'[c]✶ ✶ ✶[/c]',
								"\n",
								"\n\n",
								''
							]
						],'htm2md':[
							[
								/<a ([^>]*)>([^<]*)<\/a>/g,
								/<\/*b>/g,
								/<blockquote>(.*)<\/blockquote>/g,
								/<br>/g,
								/ . . . /g,
								/<\/*em>/g,
								/<h1>(.*)<\/h1>/g,
								/<h3>✶ ✶ ✶<\/h3>/g,
								/<hr>/g,
								/<\/*i>/g,
								/<p>/g,
								/<\/p>/g,
								/<\/*s>/g,
								/<\/*strong>/g,
								/<\/*u>/g,
								/<sub>(.*)<\/sub>/g,
								/<sup>(.*)<\/sup>/g,
								/&amp;/g,
								/—/g,
								/“/g,
								/”/g,
								/‘/g,
								/’/g
							],[
								'<# $2>',
								'**',
								"\t> $1\n",
								"\t\n",
								'...',
								'*',
								"\t# $1\n",
								"\t+++\n",
								'\t===\n',
								'*',
								"\t",
								"\n",
								'~',
								'**',
								'_',
								'$1',
								'$1',
								'&',
								'--',
								'"',
								'"',
								'`',
								"'"
							]
						],'md2htm':[
							[
								/<script([^>]*)>(.*)<\/script>/g,
								/\+\+\+/g,
								/===/g,
								/\.\.\./g,
								/\*\*([^*]*)\*\*/g,
								/\*([^*]*)\*/g,
								/_([^_]*)_/g,
								/~([^~]*)~/g,
								/(?<![=/])"([^"]*)"/g,
								/"/g,
								/`/g,
								/'/g,
								/--/g,
								/\s\s+/g,
								/(\d)(st|nd|rd|th)/g,
								/<([\w.]*)@(\w*)\.(\w*)>/g,
								/<([\w#!:.,?+=&%@!\-\/]*) ([^>]*) _>/g,
								/<(?!a href)([\w#!:.,?+=&%@!\-\/]*) ([^>]*)>/g
							],[
								'<code>$1</code>',
								'<h3>✶ ✶ ✶</h3>',
								'<hr>',
								' . . . ',
								'<b>$1</b>',
								'<i>$1</i>',
								'<u>$1</u>',
								'<s>$1</s>',
								'“$1”',
								'“',
								'‘',
								'’',
								'—',
								' ',
								'$1<sup>$2</sup>',
								'<a href="mailto:$1@$2.$3">$1@$2.$3</a>',
								'<a href="$1"target="_Blank">$2</a>',
								'<a href="$1">$2</a>'
								]
							]
						};
						if(patt==='md2htm'){
							let htm='';
							const mdarr=txt.split(/\n/g,);
							mdarr.forEach((line,i)=>{
								mdarr[i]=line.trim();
								switch(mdarr[i][0]){
									case'#':
										mdarr[i]=mdarr[i].replace(/^#\s*(.*)/g,'<h1>$1</h1>');
										break;
									case'>':
										mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<blockquote>$1</blockquote>');
										break;
									case'+':
										if(mdarr[i]=='+++'){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<h3>✶ ✶ ✶</h3>');
											break;
										}
									case'=':
										if(mdarr[i]=='==='){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<hr>');
											break;
										}
									default:
										if(mdarr[i]==''){
											mdarr[i]='<br>';
										}else{
											mdarr[i]=mdarr[i].replace(/(.*)/g,'<p>$1</p>').replace(/<p><\/p>/g,'');
										}
								}
								REGX[patt][0].forEach((p,x)=>{
									mdarr[i]=mdarr[i].replace(p,REGX[patt][1][x]);
								});
								htm+=mdarr[i];
							});
							txt=htm;
						}else{
							REGX[patt][0].forEach((p,x)=>{
								txt=txt.replace(p,REGX[patt][1][x]);
							});
						}
						return txt.trim();
					}
					this.xom=(txt='',keep_rang=true,rec=true)=>{
						if(this.iswet()){
							this.NOTEPAD.textContent=this.NOTEPAD.textContent.slice(0,this.RANG[0])+txt+this.NOTEPAD.textContent.slice(this.RANG[1]).replace(/\s+$/,'')+' ';
							if(keep_rang){
								this.RANG=[this.RANG[0]+txt.length,this.RANG[0]+txt.length];
							}else{
								this.RANG[1]=this.RANG[0]+txt.length;
							}
							this.cart();
							if(rec){
								this.raec();
							}
						}
					}
					// LISTEN
					this.NOTEPAD.addEventListener('beforeinput',e=>{
						console.log(e);
						e.preventDefault();
						switch(e.inputType){
							case'deleteByCut':this.ccp();break;
							case'deleteContentBackward':this.nix();break;
							case'formatBold':this.biu('**');break;
							case'formatItalic':this.biu();break;
							case'formatUnderline':this.biu('_');break;
							case'formatStrikethrough':this.biu('~');break;
							// case'insertFromDrop':this.xom(e.dataTransfer.getData('text'));break;
							case'insertFromPaste':this.ccp('put');break;
							case'insertParagraph':this.xom("\n\t");break;
							case'insertReplacementText':this.selmod();this.raec(this.grang());this.nix(false);this.xom(e.dataTransfer.getData('text'),false);break;
							case'insertText':this.xom(e.data);break;
						}
						this.mov();
					});
					this.NOTEPAD.addEventListener('blur',()=>{
						this.NOTEPAD.focus();
					});
					this.NOTEPAD.addEventListener('contextmenu',e=>{
						if(this.RANG[0]===this.RANG[1]){
							this.selmod();
						}
					});
					this.NOTEPAD.addEventListener('dblclick',e=>{
						this.selmod('sentence');
					});
					this.NOTEPAD.addEventListener('input',e=>{
						e.preventDefault();
						if(e.inputType==='insertCompositionText'){
							const up1=1+this.RANG[1];
							this.cart([up1,up1]);
							this.raec();
							// console.log(e);
						}
					});
					document.addEventListener('selectionchange',()=>{
						// alurt(this.HISTRY['indx']+'\n'+this.RANG);
						const selec=window.getSelection().getRangeAt(0);
						if(selec.endOffset>0){
							this.RANG=[selec.startOffset,selec.endOffset];
						}
					});
					// INIT
					if(!(this.memry())){
						this.memry('	# ');
					}
					this.NOTEPAD.textContent=this.memry();
					this.NOTEPAD.focus();
					const l=this.NOTEPAD.textContent.length;
					this.cart([l,l]);
					this.raec();
				}
			}
			// X
			const nib=new Nib();
			const jig=new Jig(nib);
			const contex=document.getElementById('contex');
			const tooble=document.getElementById('tooble');
			function alurt(msg='OK!'){
				const moda=document.createElement('div');
				moda.classList.add('alurt');
				moda.textContent=msg;
				console.log('Alurt: '+msg);
				document.body.appendChild(moda);
				moda.onclick=()=>{
					moda.remove();
				}
				moda.ontransitionend=()=>{
					moda.remove();
				}
				setTimeout(()=>{moda.style.opacity='0'},2000);
			}
			function conf(){
				cuneiform('CONFIGURE',JSON.stringify(jig.mem())).then(cfg=>{
					if(cfg){
						if(cfg===' '||cfg==='{}'){
							jig.cfg();
						}else{
							jig.mem(JSON.parse(cfg));
						}
					}
				});
			}
			async function cuneiform(promtp='Are you sure?',inpt=''){
				if(nib.iswet()){
					lokc();
				}
				return await new Promise(rezolv=>{
					const form=document.getElementById('cuneiform');
					const tin=form.children[1];
					const butt_ok=form.children[2];
					const butt_no=form.children[3];
					let rez=false;
					form.children[0].textContent=promtp;
					if(form.classList.contains('hid')){
						form.classList.toggle('hid');
					}
					if(inpt){
						tin.value=inpt;
						tin.style.display='block';
						tin.focus();
					}else{
						tin.value='';
						tin.style.display='none';
					}
					butt_ok.onclick=()=>{
						form.classList.toggle('hid');
						if(inpt){
							rez=tin.value;
						}else{
							rez=true;
						}
						rezolv(rez);
					}
					butt_no.onclick=()=>{
						form.classList.toggle('hid');
						rezolv(false);
					}
				});
			}
			function day(){
				let rgb='#333';
				if(jig.cfg('dark')){
					jig.cfg('dark',false);
					rgb='#ddd';
				}else{
					jig.cfg('dark',true);
				}
				document.body.parentElement.classList.toggle('day');
				document.querySelector("meta[name=theme-color]").setAttribute("content",rgb);
			}
			function dinosaur(w=''){
				if(!w){
					w=window.getSelection().toString();//.split(' ')[0];
				}
				window.open(jig.cfg('thesaurus_url')+w);
			}
			function lokc(){
				if(nib.NOTEPAD.spellcheck==true){
					proofa();
				}
				contex.style.display='none';
				nib.swop();
				nib.NOTEPAD.classList.toggle('lokc');
				document.getElementById('lokc').classList.toggle('act');
				const moab=document.getElementById('moab');
				moab.children[0].classList.toggle('hid');
				moab.children[2].classList.toggle('hid');
			}
			function opin(ti=null){
				if(ti){
					jig.lod(ti);
				}else{
					const f=document.createElement('input');
					f.type='file';
					f.setAttribute('accept','.htm,.html,.md,.txt');
					document.body.appendChild(f);
					f.style.display='none';
					f.click();
					f.onchange=()=>{
						const bin=f.files[0];
						jig.lod(bin);
					}
				}
			}
			function peekaboo(){
				tooble.classList.toggle('peek');
			}
			function prln(){
				if(nib.iswet()){
					lokc();
				}
				window.print();
			}
			function proofa(){
				if(!(nib.iswet())){
					lokc();
				}
				document.getElementById('proof').classList.toggle('act');
				jig.spex();
			}
			function publistche(){
				let alias=nib.sellama();
				if(jig.cfg('post_alias').trim()){
					alias=jig.cfg('post_alias');
				}
				cuneiform('PUBLISH',alias).then(issu=>{
					jig.pub(issu).then(resp=>alurt(resp)).catch(err=>{console.log(err);alurt('Error')});
				});
			}
			function pub_cfg(){
				let promtp=' '
				if(jig.cfg('post_url')){
					promtp=jig.cfg('post_url');
				}
				cuneiform('API URL',promtp).then(cfg=>{
					if(cfg){
						if(cfg===' '){
							jig.cfg('post_url','');
						}else{
							jig.cfg('post_url',cfg);
						}
					}
				});
			}
			function rush(albak,arg){
				cuneiform('Unsaved changes will be lost!').then(promp=>{
					if(promp){
						albak(arg);
					}
				});
			}
			function saef(as=false){
				jig.sav(as).then(resp=>{
					if(resp==='Saved'){
						document.title=jig.cfg('working_title');
						alurt(resp);
					}
				}).catch(err=>{
					if(!(err=='AbortError: The user aborted a request.')){
						console.log(err);
						saef(true);
					}else{
						console.log(err);
					}
				});
			}
			function saerk(){
				let regx=window.getSelection().toString();
				if(!regx){
					regx=' ';
				}
				cuneiform('REPLACE',regx).then(w=>{
					if(w.trim()){
						if(!(nib.iswet())){
							lokc();
						}
						alurt(nib.preg(w));
					}
				});
			}
			function tally(){
				alurt(nib.tally());
			}
			tooble.onclick=()=>{
				tooble.classList.toggle('peek');
			}
			document.body.addEventListener('click',e=>{
				contex.style.display='none';
			});
			document.body.addEventListener('contextmenu',e=>{
				if(nib.iswet()){
					contex.style.display='block';
					if(window.innerHeight<window.innerWidth){
						contex.style.left=(e.clientX+24)+'px';
						contex.style.top=(e.clientY+24)+'px';
					}else{
						contex.style.left='0';
						contex.style.top='auto';
					}
				}
			});
			document.body.addEventListener('keydown',e=>{
				if(e.ctrlKey||e.metaKey){
					switch(e.key.toUpperCase()){
						case'C':e.preventDefault();
							if(!(nib.iswet())){
								e.preventDefault();
								if(e.shiftKey){
									nib.cop('HTML');
									alurt('Clipboard (HTML)');
								}else{
									nib.cop('BBC');
									alurt('Clipboard (BBC)');
								}
							}
							break;
						case'E':e.preventDefault();
							if(e.shiftKey){
								pub_cfg();
							}else{
								publistche();
							}
							break;
						case'H':e.preventDefault();saerk();break;
						case'L':e.preventDefault();proofa();break;
						case'N':e.preventDefault();rush(jig.neu);break;
						case'O':e.preventDefault();opin();break;
						case'P':e.preventDefault();prln();break;
						case'Q':e.preventDefault();rush(window.close);break;
						case'R':e.preventDefault();saerk();break;
						case'S':e.preventDefault();
							if(e.shiftKey){
								saef(true);
							}else{
								saef();
							}
							break;
						case'T':e.preventDefault();tally();break;
						case'W':e.preventDefault();rush(window.close);break;
						case'Y':e.preventDefault();nib.undo(true);break;
						case'Z':e.preventDefault();nib.undo();break;
						case'=':case'-':case'_':case'+':e.preventDefault();break;
					}
				}else{
					switch(e.key){
						case'Tab':e.preventDefault();lokc();break;
						case'F7':e.preventDefault();proofa();break;
						case'F8':e.preventDefault();saerk();break;
						case'F9':e.preventDefault();day();break;
						case'F10':e.preventDefault();conf();break;
						case'F12':e.preventDefault();publistche();break;
					}
				}
			});
			document.body.onscroll=()=>{
				contex.style.display='none';
			};
			document.body.parentElement.addEventListener('dragover',e=>{
				e.preventDefault();
			});
			document.body.parentElement.addEventListener('drop',e=>{
				e.preventDefault();
				if(nib.NOTEPAD.textContent===jig.cfg('promp')){
					opin(e.dataTransfer.items[0].getAsFile());
				}else{
					const ti=e.dataTransfer.items[0].getAsFile();
					rush(opin,ti);
				}
			});
			// INIT
			if(jig.cfg('dark')){
				document.body.parentElement.classList.toggle('day');
				document.querySelector("meta[name=theme-color]").setAttribute("content",'#333');
			}
			if(nib.memry()!==jig.cfg('promp')){
				lokc();
			}
			document.body.style.opacity=1;
			setTimeout(()=>{
				tooble.classList.toggle('glass');
				document.body.parentElement.style.scrollBehavior='Smooth';
			},1234);
		</script>
	</body>
</html>
