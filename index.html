<!DOCTYPE html>
<html lang="en">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="apple-mobile-web-app-capable"content="yes">
		<meta name="mobile-web-app-capable"content="yes">
		<meta name="theme-color"content="#111111">
		<link rel="apple-touch-icon"href="apple-touch-icon.png">
		<link rel="icon"href="ico.png">
		<title>S c r a w l</title>
		<link rel="stylesheet"href="ui.css">
	</head>
	<body class="day"oncontextmenu="return false;">
		<main>
			<nav>
				<input id="scrawl-inpt-f"type="file"accept=".md,.htm,.html">
				<span class="material-icons"onclick="scrawl.naew()"title="New">insert_drive_file</span>
				<span class="material-icons"onclick="scrawl.daen()"title="Save">save</span>
				<span class="material-icons"onclick="scrawl.opaen()"title="Open">folder</span>
				<span class="material-icons"onclick="window.print()"title="Print">print</span>
				<span class="material-icons cis">more_vert</span>
				<span class="material-icons"onclick="scrawl.undo()"title="Undo">undo</span>
				<span class="material-icons"onclick="scrawl.undo(true)"title="Redo">redo</span>
				<span class="material-icons cis">more_vert</span>
				<span class="material-icons"onclick="scrawl.biu('**')"title="Bold">format_bold</span>
				<span class="material-icons"onclick="scrawl.biu()"title="Italic">format_italic</span>
				<span class="material-icons"onclick="scrawl.biu('_')"title="Underline">format_underline</span>
				<span class="material-icons"onclick="scrawl.biu('~')"title="Strikethrough">strikethrough_s</span>
				<span class="material-icons"onclick="document.execCommand('insertHTML',false,'	')"title="Tab">keyboard_tab</span>
				<span class="material-icons cis">more_vert</span>
				<span class="material-icons"onclick="scrawl.spael()"title="Spellcheck">spellcheck</span>
				<span class="material-icons"onclick="scrawl.woun()"title="Word Count">pin</span>
				<span class="material-icons"onclick="scrawl.saerk()"title="Search & Replace">search</span>
				<span class="material-icons cis">more_vert</span>
				<span class="material-icons"onclick="scrawl.WYSIWYG()"title="Preview HTML">preview</span>
				<span class="material-icons"onclick="scrawl.daerk()"title="Dark Mode">brightness_4</span>
				<span class="material-icons cis">more_vert</span>
				<span class="material-icons"onclick="scrawl.config()"title="Configure">settings</span>
				<span class="material-icons"onclick="window.open('https://github.com/Starscade/Scrawl/','_Blank')"title="About">live_help</span>
			</nav>
			<article></article>
		</main>
		<script src="scrawl.js"></script>
		<script>
			'use strict';
			const scrawl=new Scrawl();
		</script>
	</body>
</html>
