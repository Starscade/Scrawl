<!DOCTYPE html>
<html lang="en"class="day"oncontextmenu="return false">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="apple-mobile-web-app-capable"content="yes">
		<meta name="mobile-web-app-capable"content="yes">
		<meta name="theme-color"content="#111111">
		<link rel="apple-touch-icon"href="ico.png">
		<link rel="icon"href="ico.png"type="image/png"sizes="192x192">
		<title>S c r a w l</title>
		<style>
			@font-face{
				font-family:'Font';
				src:url('https://fonts.gstatic.com/s/josefinsans/v20/Qw3PZQNVED7rKGKxtqIqX5E-AVSJrOCfjY46_DjQbMZhLw.woff2');
			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--pg);
				border-radius:var(--rad);
				border:var(--bord)var(--mg);
			}
			::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#111;
				--fg:#eca;
				--hi:currentColor;
				--mg:#333;
				--no:Firebrick;
				--ok:DodgerBlue;
				--pg:#222;
				--pt:18pt;
				--font:'Font',sans-serif;
				--bord:var(--thicc) solid;
				--rad:calc(var(--pt)/3);
				--shado:0 0 1rem #00000022;
				--thicc:2pt;
				cursor:cell;
				scroll-behavior:smooth;
				scrollbar-color:var(--pg)var(--bg);
				scrollbar-width:thin;
				text-align:center;
				user-select:none;
			}
			article{
				background-color:var(--pg);
				border:var(--bord);
				border-radius:var(--rad);
				cursor:text;
				line-height:150%;
				margin:10vh auto 10vh auto;
				max-width:7.5in;
				min-height:80vh;
				padding:1in;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			body{
				background-color:var(--bg);
				color:var(--fg);
				font-family:var(--font);
				font-size:var(--pt);
				opacity:0;
			}body,h1,h3,p{
				margin:0;
			}body,nav{
				transition:opacity .5s;
			}
			h1{
				letter-spacing:3pt;
				text-transform:uppercase;
			}h1,h3{
				text-align:center;
			}
			h3{
				font-size:67%;
				letter-spacing:1.34em;
			}
			hr{
				background-image:linear-gradient(to right,transparent,currentColor,transparent);
				border:none;
				height:2pt;
			}
			p:not(br+p,p:first-of-type){
				text-indent:2em;
			}p:first-of-type::first-letter{
				float:left;
				font-size:270%;
				margin-right:.1em;
				margin-top:.38em;
			}p:first-of-type::first-line{
				font-variant:small-caps;
				font-weight:bold;
				letter-spacing:2pt;
			}
			nav{
				background-color:var(--bg);
				bottom:0;
				box-shadow:0 1em 1em var(--bg);
				overflow-x:auto;
				padding-top:.5em;
				position:fixed;
				width:100%;
			}nav:hover{
				opacity:1;
			}nav span{
				display:inline-block;
				height:24px;
				padding:.5em;
				width:24px;
			}nav span:not(.notouch){
				cursor:pointer;
			}nav span:not(.notouch):hover{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
			}nav span:last-of-type{
				color:var(--no);
			}
			svg{
				fill:currentColor;
				height:24px;
				width:24px;
			}
			.blu{
				color:var(--ok);
			}
			.day{
				--bg:#ddd;
				--fg:#667;
				--mg:#bbb;
				--pg:#eee;
			}
			.hid{
				display:none;
			}
			.locked{
				border-color:var(--mg);
				cursor:not-allowed;
				text-align:justify;
			}
			.notouch{
				opacity:.33;
			}
			@media (orientation:landscape){
				nav{
					opacity:0;
					top:0;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--mg:transparent;
					--pg:transparent;
				}
				article{
					margin:0;
					padding:0;
				}
				nav{
					display:none;
				}
			}
			@page{
				margin:1in;
			}
		</style>
	</head>

		<script src="scrawl.js"></script>
		<script>
			'use strict';
			const SCRoPS={'Δ':0,'dark':false,'url':'/+/?act=scrapb','issu':'-1.0.13.X','max_cache':1048576};
			const scrawl=new Scrawl();
			// scrawl.NOTEPAD.spellcheck='true';
			function alurt(msg='OK!'){
				const moda=document.createElement('div');
				moda.style.backgroundColor='var(--fg)';
				// moda.style.border='var(--bord)';
				moda.style.borderRadius='var(--rad)';
				moda.style.boxShadow='var(--shado)';
				moda.style.color='var(--bg)';
				moda.style.cursor='pointer';
				moda.style.left='50%';
				moda.style.padding='1em';
				moda.style.position='fixed';
				moda.style.top='11%';
				moda.style.transform='translateX(-50%)';
				moda.style.transition='opacity 1s';
				moda.style.userSelect='none';
				moda.style.zIndex='10';
				moda.textContent=msg;
				console.log('Alurt: '+msg);
				document.body.appendChild(moda);
				moda.onclick=()=>{
					moda.remove();
				}
				moda.ontransitionend=()=>{
					moda.remove();
				}
				setTimeout(()=>{moda.style.opacity='0'},3000);
			}
			function cfg(ky,valu){
				if(!localStorage.Scrawl_CFG){
					if(SCRoPS['Δ']==localStorage.Scrawl_CFG['Δ']){
						localStorage.Scrawl_CFG=JSON.stringify(SCRoPS);
					}
				}
				let cfg=JSON.parse(localStorage.Scrawl_CFG);
				if(ky){
					if(valu!=null){
						cfg[ky]=valu;
						localStorage.Scrawl_CFG=JSON.stringify(cfg);
					}else{
						return JSON.parse(localStorage.Scrawl_CFG)[ky];
					}
				}else{
					return cfg;
				}
			}
			function dark(){
				document.body.parentElement.classList.toggle('day');
			}
			function naeu(){
				localStorage.Scrawl_TXT='	# ';
				location.reload();
			}
			function opaen(){
				const f=document.createElement('input');
				f.type='file';
				f.setAttribute('accept','.md,.htm,.html');
				document.body.appendChild(f);
				f.style.display='none';
				f.click();
				f.onchange=()=>{
					const bin=f.files[0];
					const raed=new FileReader();
					raed.readAsText(bin);
					raed.onload=()=>{
						const dot=bin.name.split('.');
						if(dot[dot.length-1]=='md'){
							localStorage.Scrawl_TXT=scrawl.x2m(scrawl.x2m(raed.result),'htm2md');
						}else{
							localStorage.Scrawl_TXT=scrawl.x2m(raed.result,'htm2md');
						}
						location.reload();
					}
				}
			}
			function ops(){
				const cfg=window.prompt('Configure . . .',localStorage.Scrawl_CFG);
				if(cfg){
					if(cfg===' '||cfg==='{}'){
						localStorage.Scrawl_CFG=JSON.stringify(SCRoPS);
					}else{
						localStorage.Scrawl_CFG=cfg;
					}
				}
			}
			function rush(albak){
				const promp=window.confirm('Unsaved changes will be lost!');
				if(promp){
					albak();
				}
			}
			function saef(){
				const md=scrawl.x2m(scrawl.x2m(),'htm2md').replace(/\t/g,'');
				const bob=new Blob([md],{type:'text/markdown;charset=utf-8'});
				const uri=window.URL.createObjectURL(bob);
				const a=document.createElement('a');
				const h1=localStorage.Scrawl_TXT.trim().split("\n")[0].trim();
				let naem='Untitled';
				if(h1.startsWith('#')){
					naem=h1.replace(/#\s*(.*)/,'$1');
				}
				document.body.appendChild(a);
				a.style='display:none';
				a.href=uri;
				a.download=naem+'.md';
				a.click();
				a.remove();
				window.URL.revokeObjectURL(uri);
			}
			function saen(){
				const issu=window.prompt('POST . . .',cfg('issu'));
				if(issu){
					cfg('issu',issu);
					const Formbody=new FormData();
					Formbody.append(0,new Blob([scrawl.x2m()]),issu);
					fetch('/+/?act=scrapb',{
						method:'POST',
						body:Formbody
					}).then(
						resp=>resp.text()
					).then(
						resp=>{
							alurt(resp)
						}
					)
				}
			}
			function shex(){
				if(scrawl.NOTEPAD.spellcheck=='true'){
					scrawl.NOTEPAD.spellcheck='false';
					alurt('Spellcheck off . . .');
				}else{
					scrawl.NOTEPAD.spellcheck='true';
					alurt('Spellcheck on . . .');
				}
				document.getElementById('ui-shex').classList.toggle('blu');
			}
			function swop(){
				if(scrawl.NOTEPAD.contentEditable=='true'){
					scrawl.NOTEPAD.contentEditable='false';
					document.getElementById('ui-lox').children[0].classList.toggle('hid');
					document.getElementById('ui-lox').children[1].classList.toggle('hid');
					scrawl.NOTEPAD.innerHTML=scrawl.x2m();
				}else{
					scrawl.NOTEPAD.contentEditable='true';
					document.getElementById('ui-lox').children[0].classList.toggle('hid');
					document.getElementById('ui-lox').children[1].classList.toggle('hid');
					scrawl.NOTEPAD.innerHTML=localStorage.Scrawl_TXT;
					scrawl.NOTEPAD.focus();
				}
				scrawl.NOTEPAD.classList.toggle('locked');
			}
			scrawl.NOTEPAD.addEventListener('click',()=>{
				if(scrawl.NOTEPAD.contentEditable=='false'){
					navigator.clipboard.writeText(scrawl.x2m());
					alurt('Copied to clipboard . . . (HTML)');
				}
			});
			scrawl.NOTEPAD.addEventListener('contextmenu',()=>{
				if(scrawl.NOTEPAD.contentEditable=='false'){
					navigator.clipboard.writeText(scrawl.x2m(scrawl.x2m(),'par2bbc'));
					alurt('Copied to clipboard . . . (BBC)');
				}
			});
			document.body.addEventListener('keydown',e=>{
				if(e.ctrlKey||e.metaKey){
					switch(e.key.toUpperCase()){
						case'E':e.preventDefault();saen();break;
						case'K':e.preventDefault();scrawl.biu('~');break;
						// case'L':e.preventDefault();shex();break;
						case'N':e.preventDefault();rush(naeu);break;
						case'O':e.preventDefault();opaen();break;
						case'Q':case'W':e.preventDefault();rush(window.close);break;
						case'S':e.preventDefault();saef();break;
						case'T':e.preventDefault();alurt(scrawl.tally());break;
						case'Y':e.preventDefault();scrawl.undo(true);break;
						case'Z':e.preventDefault();scrawl.undo();break;
					}
				}else{
					switch(e.key){
						case'Tab':e.preventDefault();swop();break;
						case'F7':e.preventDefault();shex();break;
						case'F9':e.preventDefault();dark();break;
					}
				}
		});
		if(localStorage.Scrawl_TXT!='	# '){
			swop();
		}
		document.body.style.opacity=1;
		</script>
	</body>
</html>
