			}
			@keyframes pop{
				from{
					outline-offset:0;
				}to{
					outline-offset:2pt;
					outline-color:transparent;
				}
			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--mg);
				border-radius:var(--rad);
				border:4pt solid var(--bg);
			}
			::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#222;
				--fg:#eca;
				--mg:#444;
				--no:Firebrick;
				--ok:DodgerBlue;
				--pg:#333;
				--pt:18pt;
				--bord:2pt solid;
				--font:'Font',sans-serif;
				--rad:calc(var(--pt)/3);
				cursor:crosshair;
				scroll-behavior:smooth;
				text-align:center;
				user-select:none;
			}
			a{
				border-bottom:2pt dotted;
				color:currentColor;
				text-decoration:none;
			}a[target="_Blank"]::after{
				content:'◥';
				font-size:50%;
				vertical-align:super;
			}a:hover{
				border-bottom-style:solid;
			}
			article{
				border-radius:var(--rad);
				cursor:text;
				line-height:150%;
				margin:auto auto 7em auto;
				max-width:7.5in;
				min-height:80vh;
				padding:1em;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			blockquote{
				font-style:italic;
				margin:0;
				text-align:center;
			}
			body{
				background-color:var(--bg);
				color:var(--fg);
				font-family:var(--font);
				font-size:var(--pt);
				opacity:0;
			}body,h1,h3,p{
				margin:0;
			}body,nav{
				transition:opacity .5s;
			}
			h1{
				font-size:100%;
				font-variant:small-caps;
				letter-spacing:3pt;
				margin:auto;
			}h1,h3{
				text-align:center;
			}
			h3{
				font-size:67%;
				letter-spacing:1.34em;
			}
			hr{
				background-image:linear-gradient(to right,transparent,var(--fg),transparent);
				border:none;
				height:2pt;
			}
			input{
				background-color:inherit;
				border:none;
				color:inherit;
				font-family:inherit;
				font-size:inherit;
				outline:none;
			}
			p:not(br+p,p:first-of-type){
				text-indent:2em;
			}
			nav{
				background-color:var(--bg);
				bottom:0;
				box-shadow:0 -1em 1em var(--bg);
				padding-bottom:7vh;
				padding-top:.5em;
				position:fixed;
				width:100%;
			}nav:nth-of-type(2){
				bottom:14vh;
				left:50%;
				transform:translateX(-50%);
				width:10em;
			}nav span{
				display:inline-block;
				height:24px;
				padding:.5em;
				width:24px;
			}nav span:not(.notouch){
				cursor:pointer;
			}
			small{
				font-size:1em;
				font-variant:small-caps;
			}
			svg{
				fill:currentColor;
				height:24px;
				width:24px;
			}
			.alurt{
				animation:pop 1s forwards;
				background-color:var(--fg);
				border:var(--bord) var(--pg);
				border-radius:var(--rad);
				color:var(--bg);
				cursor:pointer;
				left:50%;
				outline:3pt solid var(--fg);
				padding:.33em .66em .33em .66em;
				position:fixed;
				top:11%;
				transform:translateX(-50%);
				transition:opacity 1s;
				user-select:none;
				white-space:pre;
				z-index:10;
			}
			.bad{
				color:var(--no);
			}
			.blu article{
				/* border-color:var(--ok); */
				border-style:dashed;
			}.blu #ui-spex,.ok{
				color:var(--ok);
			}
			.day{
				--bg:#ddd;
				--fg:#667;
				--mg:#bbb;
				--pg:#eee;
			}
			.hid,.inland,.notouch,.peek,#big{
				display:none;
			}
			.locked{
				border-color:var(--mg);
				cursor:not-allowed;
				text-align:justify;
			}
			.notouch{
				opacity:.33;
			}
			#contex{
				background-color:var(--fg);
				border:var(--bord) var(--pg);
				border-radius:var(--rad);
				bottom:auto;
				box-shadow:none;
				color:var(--bg);
				display:none;
				padding:0;
				width:auto;
			}#contex>span{
				margin:2pt;
			}
			/* #hunt{
				display:none;
			} */
			@media(orientation:landscape){
				article{
					background-color:var(--pg);
					border:var(--bord);
					margin-bottom:10vh;
					margin-top:10vh;
					padding:1in;
				}
				nav:not(#contex){
					bottom:auto;
					box-shadow:0 1em 1em var(--bg);
					opacity:0;
					overflow:auto hidden;
					padding-bottom:0;
					top:0;
					white-space:nowrap;
				}nav:hover:not(#contex){
					opacity:1;
				}nav:nth-of-type(2){
					left:0;
					transform:none;
					width:100%;
				}nav span:not(.notouch):hover{
					background-color:var(--fg);
					border-radius:var(--rad);
					color:var(--bg);
				}
				.inland,.notouch,#big{
					display:inline-block;
				}
				.mobly,#Q{
					display:none;
				}
				.peek{
					display:block;
				}
				#contex>span:hover{
					background-color:var(--pg);
					color:var(--fg);
				}
			}@media(orientation:landscape) and (display-mode:fullscreen){
				#Q{
					display:inline-block;
				}
			}
			@media(display-mode:standalone){
				.instal{
					display:none;
				}
			}@media(display-mode:fullscreen){
				.instal{
					display:none;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--mg:transparent;
					--pg:transparent;
				}
				article{
					margin:0;
					padding:0;
				}
				nav,.alurt{
					display:none;
				}
			}
			@page{
				margin:1in;
			}
		</style>
	</head>

							/"/g,
							/`/g,
							/'/g,
							/--/g,
							/\s\s+/g,
							/(\d)(st|nd|rd|th)/g,
							/<([\w.]*)@(\w*)\.(\w*)>/g,
							/<([\w#!:.,?+=&%@!\-\/]*) ([^>]*) _>/g,
							/<(?!a href)([\w#!:.,?+=&%@!\-\/]*) ([^>]*)>/g
						],[
							'<code>$1</code>',
							'<h3>✶ ✶ ✶</h3>',
							'<hr>',
							' . . . ',
							'<b>$1</b>',
							'<i>$1</i>',
							'<u>$1</u>',
							'<s>$1</s>',
							'“$1”',
							'“',
							'‘',
							'’',
							'—',
							' ',
							'$1<sup>$2</sup>',
							'<a href="mailto:$1@$2.$3">$1@$2.$3</a>',
							'<a href="$1"target="_Blank">$2</a>',
							'<a href="$1">$2</a>'
							]
						],'htm2bbc':[
							[
								/</g,
								/>/g,
								/strong\]/g,
								/em\]/g,
								/\[h1\](.*?)\[\/h1\]/g,
								/\[h3\]✶ ✶ ✶\[h3\]/g,
								/\[br\]/g,
								/\[p\]/g,
								/\[\/p\]/g
							],[
								'[',
								']',
								'b]',
								'i]',
								"[c]$1[/c]",
								'[c]✶ ✶ ✶[/c]',
								"\n",
								"\n\n",
								''
							]
						]
					}
					// FUN
					this.autypo=(typo=this.TYPO)=>{
						let txt=this.NOTEPAD.textContent;
						Object.keys(typo).forEach(e=>{
							const regx=new RegExp("\\b"+e+"\\b",'g');
							txt=txt.replace(regx,typo[e]).replaceAll(/ +/g,' ');
						});
						if(this.NOTEPAD.textContent!=txt){
							this.NOTEPAD.textContent=txt;
							this.raec();
							this.cart();
						}
						return txt;
					}
					this.biu=(g='*')=>{
						const rang=this.NOTEPAD.textContent.slice(this.RANG[0],this.RANG[1]);
						let txt;
						let keep_rang;
						if(rang.length>0){
							if(rang.startsWith(g)){
								if(rang===g){
									txt='';
								}else{
									txt=rang.substring(g.length,rang.length-g.length);
								}
							}else{
								txt=g+rang+g;
							}
							keep_rang=false;
						}else{
							txt=g;
							keep_rang=true;
						}
						this.xom(txt,keep_rang);
					}
					this.cop=(lang='HTML')=>{
						switch(lang){
							case'BBC':navigator.clipboard.writeText(scrawl.x2m(scrawl.x2m(),'htm2bbc'));break;
							case'HTML':navigator.clipboard.writeText(scrawl.x2m());break;
							case'MD':
							default:navigator.clipboard.writeText(String(scrawl.x2m(scrawl.x2m(),'htm2md')).replaceAll(/\t/g,"\n"));
						}
					}
					this.cart=(pos=null)=>{
						if(!this.NOTEPAD.childNodes[0]){
							this.NOTEPAD.append(document.createTextNode(''));
						}
						const selec=window.getSelection();
						const rang=document.createRange();
						if(pos){
							this.RANG=[pos[0],pos[1]];
						}
						this.RANG.forEach((r,x)=>{
							const l=this.NOTEPAD.textContent.length;
							if(r>l){
								this.RANG[x]=l;
							}
						});
						rang.setStart(this.NOTEPAD.childNodes[0],this.RANG[0]);
						rang.setEnd(this.NOTEPAD.childNodes[0],this.RANG[1]);
						selec.removeAllRanges();
						selec.addRange(rang);
					}
					this.nix=(rec=true)=>{
						if(this.RANG[0]===this.RANG[1]){
							if(this.RANG[0]>0){
								this.RANG[0]--;
							}
						}
						this.xom('',true,rec);
					}
					this.opin=(bin)=>{
						const raed=new FileReader();
						raed.readAsText(bin);
						raed.onload=()=>{
							const dot=bin.name.split('.');
							if(dot[dot.length-1]=='md'){
								localStorage.Scrawl_TXT=this.x2m(this.x2m(raed.result),'htm2md');
							}else{
								localStorage.Scrawl_TXT=this.x2m(raed.result,'htm2md');
							}
							location.reload();
						}
					}
					this.raec=()=>{
						localStorage.Scrawl_TXT=this.NOTEPAD.textContent;
						if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
							let oldTxt=this.HISTRY['txt'].splice(this.HISTRY['indx']);
							let oldCart=this.HISTRY['cart'].splice(this.HISTRY['indx']);
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							oldTxt.pop();
							oldTxt.reverse();
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							oldCart.pop();
							oldCart.reverse();
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							this.HISTRY['indx']=this.HISTRY['txt'].length;
						}else{
							this.HISTRY['indx']++;
						}
						this.HISTRY['txt'][this.HISTRY['indx']]=this.NOTEPAD.textContent;
						this.HISTRY['cart'][this.HISTRY['indx']]=this.RANG;
						if(this.HISTRY['txt'].length>cfg('max_undo')){
							this.HISTRY['txt'].shift();
							this.HISTRY['cart'].shift();
							this.HISTRY['indx']--;
						}
					}
					this.saerk=(wurdz)=>{
						if(this.NOTEPAD.contentEditable=='true'){
							const w=wurdz.split('|');
							const rx=new RegExp('\\b'+w[0]+'\\b','g');
							const k=[...this.NOTEPAD.innerHTML.matchAll(rx)].length;
							this.NOTEPAD.innerHTML=this.NOTEPAD.innerHTML.replaceAll(rx,w[1]);
							this.raec();
							return'Replaced '+k+' occurrences . . .';
						}else{
							return'Cannot make changes while locked!';
						}
					}
					this.selmod=(scope='word')=>{
						window.getSelection().modify('move','backward',scope);
						window.getSelection().modify('extend','forward',scope);
						const selec=window.getSelection();
						const rang=selec.getRangeAt(0);
						const nurang=document.createRange();
						let beg=0;
						let nd=0;
						if(selec.toString()[0]=='	'){
							beg=1;
						}
						if(selec.toString()[selec.toString().length-1]==' '){
							nd=1;
						}
						nurang.setStart(this.NOTEPAD.childNodes[0],rang.startOffset+beg);
						nurang.setEnd(this.NOTEPAD.childNodes[0],rang.endOffset-nd);
						selec.removeAllRanges();
						selec.addRange(nurang);
						this.RANG=[nurang.startOffset,nurang.endOffset];
					}
					this.tally=()=>{
						let txt='';
						if(window.getSelection().toString().length>0){
							txt=this.x2m(window.getSelection().toString());
						}else{
							txt=this.x2m();
						}
						const wurdz=txt.split(/ +/).length;
						return wurdz;
					}
					this.undo=(re=false)=>{
						if(this.NOTEPAD.contentEditable=='true'){
							let go=false;
							if(re){
								if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
									this.HISTRY['indx']++;
									go=true;
								}
							}else{
								if(this.HISTRY['indx']>1){
									this.HISTRY['indx']--;
									go=true;
								}
							}
							if(go){
								this.NOTEPAD.textContent=this.HISTRY['txt'][this.HISTRY['indx']];
								this.RANG=this.HISTRY['cart'][this.HISTRY['indx']];
								this.cart();
								localStorage.Scrawl_TXT=this.NOTEPAD.textContent;
							}
						}
					}
					this.x2m=(txt=localStorage.Scrawl_TXT,regx='md2htm')=>{
						if(regx==='md2htm'){
							let htm='';
							const mdarr=txt.split(/\n/g,);
							mdarr.forEach((line,i)=>{
								mdarr[i]=line.trim();
								switch(mdarr[i][0]){
									case'#':
										mdarr[i]=mdarr[i].replace(/^#\s*(.*)/g,'<h1>$1</h1>');
										break;
									case'>':
										mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<blockquote>$1</blockquote>');
										break;
									case'+':
										if(mdarr[i]=='+++'){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<h3>✶ ✶ ✶</h3>');
											break;
										}
									case'=':
										if(mdarr[i]=='==='){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<hr>');
											break;
										}
									default:
										if(mdarr[i]==''){
											mdarr[i]='<br>';
										}else{
											mdarr[i]=mdarr[i].replace(/(.*)/g,'<p>$1</p>').replace(/<p><\/p>/g,'');
										}
								}
								this.REGX[regx][0].forEach((p,x)=>{
									mdarr[i]=mdarr[i].replace(p,this.REGX[regx][1][x]);
								});
								htm+=mdarr[i];
							});
							txt=htm;
						}else{
							this.REGX[regx][0].forEach((p,x)=>{
								txt=txt.replace(p,this.REGX[regx][1][x]);
							});
							if(regx==='htm2rtf'){
								txt='{\\rtf1\\ansi{\\info{\\author '+cfg('author')+'}{\\doccomm '+cfg('comment')+'}}'+txt+'}';
							}
						}
						return txt.trim();
					}
					this.xom=(txt='',x=true,rec=true)=>{
						if(this.NOTEPAD.contentEditable=='true'){
							this.HISTRY['cart'][this.HISTRY['indx']]=this.RANG;
							this.NOTEPAD.textContent=this.NOTEPAD.textContent.slice(0,this.RANG[0])+txt+this.NOTEPAD.textContent.slice(this.RANG[1]).replace(/\s+$/,'')+' ';
							if(x){
								this.RANG=[this.RANG[0]+txt.length,this.RANG[0]+txt.length];
							}else{
								this.RANG[1]=this.RANG[0]+txt.length;
							}
							this.cart();
							if(rec){
								this.raec();
							}
						}
					}
					// HEY, LISTEN!
					this.NOTEPAD.addEventListener('beforeinput',e=>{
						e.preventDefault();
						// console.log(e);
						switch(e.inputType){
							case'deleteByCut':
							case'deleteContentBackward':this.nix();break;
							case'formatBold':this.biu('**');break;
							case'formatItalic':this.biu();break;
							case'formatUnderline':this.biu('_');break;
							case'formatStrikethrough':this.biu('~');break;
							case'insertFromPaste':navigator.clipboard.readText().then(txt=>this.xom(txt,false));break;
							case'insertParagraph':this.xom("\n\t");break;
							case'insertReplacementText':this.selmod();this.nix(false);this.xom(e.dataTransfer.getData('text'),false);break;
							case'insertText':this.xom(e.data);break;
						}
						const rex=window.getSelection().getRangeAt(0).getClientRects()[0]['top'];
						const pos=Math.round(window.scrollY+rex)-(window.innerHeight/3);
						window.scrollTo(0,pos);
					});
					this.NOTEPAD.addEventListener('blur',()=>{
						this.NOTEPAD.focus();
					});
					this.NOTEPAD.addEventListener('compositionend',e=>{
						// console.log(e.data);
						this.cart();
					});
					this.NOTEPAD.addEventListener('input',e=>{
						e.preventDefault();
						if(e.inputType==='insertCompositionText'){
							this.raec();
							switch(e.data.slice(-1)){
								case"\n":this.xom("\n\t");break;
								case' ':this.xom(' ');break;
							}
						}
					});
					document.addEventListener('selectionchange',()=>{
						const selec=window.getSelection().getRangeAt(0);
						this.RANG=[selec.startOffset,selec.endOffset];
						// console.log(this.RANG);
						// const txt=this.NOTEPAD.textContent.replaceAll(/\n/g,'⏎').replaceAll(/\t/g,'⇥').replaceAll(/ /g,'◦');
					});
					// INIT
					if(!this.NOTEPAD.childNodes[0]){
						this.NOTEPAD.append(document.createTextNode(''));
					}
					if(localStorage.Scrawl_TXT){
						this.NOTEPAD.textContent=localStorage.Scrawl_TXT;
					}
					this.NOTEPAD.focus();
					const l=this.NOTEPAD.textContent.length;
					this.cart([l,l]);
					this.raec();
				}
			}
			// MAIN
			const SCRoPS={'Δ':0,'author':'Angus "Starscade" Sheehan','comment':'https://starsca.de/','dark':false,'intro':true,'max_undo':99,'post_alias':'','post_url':'http://localhost/act.php','promp':'	# ','word_url':'https://www.merriam-webster.com/thesaurus/'};

				if(ky){
					if(valu!=null){
						cfg[ky]=valu;
						localStorage.Scrawl_CFG=JSON.stringify(cfg);
					}else{
						return cfg[ky];
					}
				}else{
					if(localStorage.Scrawl_CFG!==JSON.stringify(SCRoPS)){
						Object.keys(SCRoPS).forEach((i,x)=>{
							if(!(i in cfg)){
								cfg[i]=SCRoPS[i];
							}
						});
						Object.keys(cfg).forEach((i,x)=>{
							if(!(i in SCRoPS)){
								delete cfg[i];
							}
						});
						localStorage.Scrawl_CFG=JSON.stringify(cfg);
					}
					return cfg;
				}

			async function mkHand(naem){
				if(HAND===false){
					const opts={
						suggestedName:naem,
						excludeAcceptAllOption:true,
						types:[{
							description:'Markdown',
							accept:{
								'text/markdown':['.md']
							}
						},{
							description:'HTML',
							accept:{
								'text/html':['.htm']
							}
						},{
							description:'Plaintext',
							accept:{
								'text/plain':['.txt']
							}
						}/* ,{
							description:'Richtext',
							accept:{
								'application/rtf':['.rtf']
							}
						} */]
					};
					HAND=await window.showSaveFilePicker(opts);
				}
				const f=await HAND.getFile();
				const fn=f.name.split('.');
				const fx=fn[fn.length-1];
				let md;
				switch(fx.toLowerCase()){
					/* case'rtf':md=scrawl.x2m(scrawl.x2m(),'htm2rtf').replaceAll(/\t/g,'');break; */
					case'htm':md=scrawl.x2m();break;
					case'md':md=scrawl.x2m(scrawl.x2m(),'htm2md').replaceAll(/\t/g,'');break;
					default:md=scrawl.x2m(scrawl.x2m(),'htm2md');
				}
				const mime={'md':'text/markdown','htm':'text/html','txt':'text/plain','rtf':'application/rtf'};
				const bob=new Blob([md],{type:mime[fx]+';charset=utf-8'});
				const pen=await HAND.createWritable();
				await pen.write(bob);
				await pen.close();
				alurt('Saved!');
			}

						}
					}
					if(scrawl.NOTEPAD.contentEditable=='false'){
						if(e.key.toUpperCase()=='C'){
							e.preventDefault();
							if(e.shiftKey){
								scrawl.cop('HTML');
								alurt('Copied to clipboard . . . (HTML)');
							}else{
								scrawl.cop('BBC');
								alurt('Copied to clipboard . . . (BBC)');
							}
						}
					}
					switch(e.key.toUpperCase()){
						case'E':e.preventDefault();saen();break;
						// case'F':e.preventDefault();hunt();break;
						case'H':e.preventDefault();saerk();break;
						case'K':e.preventDefault();scrawl.biu('~');break;
						case'L':e.preventDefault();spex();break;
						case'N':e.preventDefault();rush(naeu);break;
						case'O':e.preventDefault();opaen();break;
						case'Q':case'W':e.preventDefault();rush(window.close);break;
						case'T':e.preventDefault();alurt(scrawl.tally());break;
						case'Y':e.preventDefault();scrawl.undo(true);break;
						case'Z':e.preventDefault();scrawl.undo();break;
						case'=':case'-':case'_':case'+':e.preventDefault();break;
					}
				}else{
					switch(e.key){
						case'Tab':e.preventDefault();swop();break;
						case'F7':e.preventDefault();spex();break;
						case'F8':e.preventDefault();saerk();break;
						case'F9':e.preventDefault();dark();break;
						case'F10':e.preventDefault();ops();break;
						case'F12':e.preventDefault();saen();break;
					}
				}
			});
			document.body.onclick=(e)=>{
				contex.style.display='none';
			}
			document.body.onscroll=()=>{
				contex.style.display='none';
			}
			document.body.parentElement.ondragover=(e)=>{
				e.preventDefault();
			}
			document.body.parentElement.ondrop=(e)=>{
				e.preventDefault();
				if(scrawl.NOTEPAD.textContent===cfg('promp')){
					opaen(e.dataTransfer.items[0].getAsFile());
				}else{
					rush(opaen(e.dataTransfer.items[0].getAsFile()));
				}
			}
			window.addEventListener('beforeinstallprompt',e=>{
				INSTAL=e;
			});
			window.addEventListener('beforeprint',e=>{
				if(scrawl.NOTEPAD.contentEditable=='true'){
					swop();
				}
			});
			scrawl.NOTEPAD.oncontextmenu=(e)=>{
				if(scrawl.NOTEPAD.contentEditable=='true'){
					if(scrawl.RANG[0]===scrawl.RANG[1]){
						scrawl.selmod();
					}
					contex.style.display='block';
					contex.style.left=(e.clientX+64)+'px';
					contex.style.top=(e.clientY+24)+'px';
				}
			}
			scrawl.NOTEPAD.ondblclick=(e)=>{
				scrawl.selmod('sentence');
			}
			instal.onclick=async ()=>{
				if(INSTAL!==null){
					INSTAL.prompt();
					const{outcome}=await INSTAL.userChoice;
					if(outcome==='accepted'){
						INSTAL=null;
					}
				}
			}
			// INIT
			if(cfg('dark')){
				document.body.parentElement.classList.toggle('day');
				document.querySelector("meta[name=theme-color]").setAttribute("content",'#222');
			}
			spex();
			if(cfg('intro')){
				cfg('intro',false);
				localStorage.Scrawl_TXT=cfg('promp');
			}
			if(localStorage.Scrawl_TXT!=cfg('promp')){
				swop();
			}
			scrawl.NOTEPAD.setAttribute('spellcheck','false');
			setTimeout(()=>{window.scrollTo(0,0);const l=localStorage.Scrawl_TXT.length;scrawl.RANG=[l,l]},1000);
			document.body.style.opacity=1;
			if('serviceWorker'in navigator){
				navigator.serviceWorker.register('work.js');
			}
		</script>
	</body>
</html>
