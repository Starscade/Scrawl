<!doctype html>
<html>
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="theme-color"content="#ddd">
		<link rel="manifest"href="manifest.json"type="application/manifest+json">
		<link rel="icon"href="ico.png">
		<title>S c r a w l</title>
		<style>
			@font-face {
				font-family:'Font';
				src:url('Baloo2.woff2');
			}
			:root{
				--bg:#ddd;
				--fg:#667;
				background-color:var(--bg);
				color:var(--fg);
				cursor:crosshair;
				font-family:'Font',sans-serif;
				font-size:x-large;
				text-align:center;
				user-select:none;
			}
			button{
				background-color:inherit;
				border:2pt solid var(--fg);
				border-radius:2em;
				color:inherit;
				font-family:inherit;
				font-size:inherit;
				min-width:6em;
				padding:.5em;
				text-transform:uppercase;
			}button:focus{
				outline:none;
			}button:hover{
				background-color:var(--bg);
				color:var(--fg);
			}
			h1{
				font-weight:normal;
				margin:0;
			}
			img{
				width:10em;
			}
			main{
				left:50%;
				position:fixed;
				top:50%;
				transform:translate(-50%,-57%);
			}
			.inv{
				background-color:var(--fg);
				color:var(--bg);
				cursor:pointer;
			}
		</style>
	</head>
	<body>
		<main>
			<img src="adapticon.png"draggable="false">
			<h1>The free, Internet typewriter.</h1>
			<br>
			<button class="inv">Install</button>
		</main>
		<script>
			'use strict';
			const instal=document.getElementsByTagName('button')[0];
			let INSTAL;
			instal.onclick=async ()=>{
				if(INSTAL){
					INSTAL.prompt();
					const{outcome}=await INSTAL.userChoice;
					if(outcome==='accepted'){
						INSTAL=null;
						location.href='./once-upon-a-time';
					}
				}
			}
			window.addEventListener('beforeinstallprompt',e=>{
				INSTAL=e;
			});
			if('serviceWorker'in navigator){
				navigator.serviceWorker.register('work.js');
			}
			if(localStorage.Scrawl_CFG){
				instal.textContent='Installed';
				instal.classList.toggle('inv');
			}
		</script>
	</body>
</html>
