<!DOCTYPE html>
<html lang="en"class="day"oncontextmenu="return false">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="apple-mobile-web-app-capable"content="yes">
		<meta name="mobile-web-app-capable"content="yes">
		<link rel="manifest"href="manifest.json">
		<meta name="theme-color"content="#ddd">
		<link rel="apple-touch-icon"href="ico.png">
		<link rel="icon"href="ico.png"type="image/png"sizes="192x192">
		<title>S c r a w l</title>
		<style>
			@font-face{
				font-family:'Font';
				src:url('Baloo2.woff2');
			}
			@keyframes pop{
				from{
					outline-offset:0;
				}to{
					outline-offset:2pt;
					outline-color:transparent;
				}
			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--mg);
				border-radius:var(--rad);
				border:4pt solid var(--bg);
			}
			::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#222;
				--fg:#eca;
				--mg:#444;
				--no:Firebrick;
				--ok:DodgerBlue;
				--pg:#333;
				--pt:18pt;
				--bord:2pt solid;
				--font:'Font',sans-serif;
				--rad:calc(var(--pt)/3);
				cursor:crosshair;
				scroll-behavior:smooth;
				text-align:center;
				user-select:none;
			}
			a{
				border-bottom:2pt dotted;
				color:currentColor;
				text-decoration:none;
			}a[target="_Blank"]::after{
				content:'◥';
				font-size:50%;
				vertical-align:super;
			}a:hover{
				border-bottom-style:solid;
			}
			article{
				border-radius:var(--rad);
				cursor:text;
				line-height:150%;
				margin:auto auto 1em auto;
				max-width:7.5in;
				min-height:80vh;
				padding:2em;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			blockquote{
				font-style:italic;
				margin:0;
				text-align:center;
			}
			body{
				background-color:var(--bg);
				color:var(--fg);
				font-family:var(--font);
				font-size:var(--pt);
				opacity:0;
			}body,h1,h3,p{
				margin:0;
			}body,nav{
				transition:opacity .5s;
			}
			h1{
				font-size:100%;
				font-variant:small-caps;
				letter-spacing:3pt;
				margin:auto;
			}h1,h3{
				text-align:center;
			}
			h3{
				font-size:67%;
				letter-spacing:1.34em;
			}
			hr{
				background-image:linear-gradient(to right,transparent,var(--fg),transparent);
				border:none;
				height:2pt;
			}
			input{
				background-color:inherit;
				border:none;
				color:inherit;
				font-family:inherit;
				font-size:inherit;
				outline:none;
			}
			p:not(br+p,p:first-of-type){
				text-indent:2em;
			}
			nav{
				background-color:var(--bg);
				bottom:0;
				box-shadow:0 -1em 1em var(--bg);
				overflow-x:auto;
				padding-top:.5em;
				position:fixed;
				white-space:nowrap;
				width:100%;
			}nav:hover{
				opacity:1;
			}nav span,#menu>span{
				display:inline-block;
				height:24px;
				padding:.5em;
				width:24px;
			}nav span:not(.notouch),#menu>span{
				cursor:pointer;
			}nav span:not(.notouch):hover{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
			}
			small{
				font-size:1em;
				font-variant:small-caps;
			}
			svg{
				fill:currentColor;
				height:24px;
				width:24px;
			}
			.alurt{
				animation:pop 1s forwards;
				background-color:var(--fg);
				border:var(--bord) var(--pg);
				border-radius:var(--rad);
				color:var(--bg);
				cursor:pointer;
				left:50%;
				outline:3pt solid var(--fg);
				padding:.33em .66em .33em .66em;
				position:fixed;
				top:11%;
				transform:translateX(-50%);
				transition:opacity 1s;
				user-select:none;
				white-space:pre;
				z-index:10;
			}
			.bad{
				color:var(--no);
			}
			.blu article{
				border-color:var(--ok);
			}.blu #ui-spex{
				color:var(--ok);
			}
			.day{
				--bg:#ddd;
				--fg:#667;
				--mg:#bbb;
				--pg:#eee;
			}
			.hid{
				display:none;
			}
			.locked{
				border-color:var(--mg);
				cursor:not-allowed;
				text-align:justify;
			}
			.notouch{
				opacity:.33;
			}
			#hunt{
				display:none;
			}
			#menu{
				/* background-color:var(--pg); */
				/* border-color:currentColor; */
				/* color:var(--fg); */
				display:none;
				padding:0;
			}#menu>span{
				margin:2pt;
			}#menu>span:first-of-type{
				border-radius:var(--rad) 0 0 var(--rad);
			}#menu>span:last-of-type{
				border-radius:0 var(--rad) var(--rad) 0;
			}#menu>span:hover{
				background-color:var(--pg);
				color:var(--fg);
			}
			@media(orientation:landscape){
				article{
					background-color:var(--pg);
					border:var(--bord);
					margin-bottom:10vh;
					margin-top:10vh;
					padding:1in;
				}
				nav{
					bottom:auto;
					box-shadow:0 1em 1em var(--bg);
					opacity:0;
					top:0;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--mg:transparent;
					--pg:transparent;
				}
				article{
					margin:0;
					padding:0;
				}
				nav,.alurt{
					display:none;
				}
			}
			@page{
				margin:1in;
			}
		</style>
	</head>

		<script>
			'use strict';
			class Scrawl{
				constructor(notepad=document.getElementsByTagName('article')[0]){
					this.NOTEPAD=notepad;
					this.NOTEPAD.contentEditable='true';
					this.NOTEPAD.spellcheck='true';

					this.REGX={'htm2md':[

					// FUN
					this.autypo=(typo=this.TYPO)=>{
						let txt=this.NOTEPAD.textContent;
						Object.keys(typo).forEach(e=>{
							const regx=new RegExp("\\b"+e+"\\b",'g');
							txt=txt.replace(regx,typo[e]).replaceAll(/ +/g,' ');
						});
						if(this.NOTEPAD.textContent!=txt){
							this.NOTEPAD.textContent=txt;
							this.raec();
							this.cart();
						}
						return txt;
					}
					this.biu=(g='*')=>{
						const rang=this.NOTEPAD.textContent.slice(this.RANG[0],this.RANG[1]);
						let txt;
						let keep_rang;
						if(rang.length>0){
							if(rang.startsWith(g)){
								if(rang===g){
									txt='';
								}else{
									txt=rang.substring(g.length,rang.length-g.length);
								}
							}else{
								txt=g+rang+g;
							}
							keep_rang=false;
						}else{
							txt=g;
							keep_rang=true;
						}
						this.xom(txt,keep_rang);
					}
					this.cop=(lang='HTML')=>{

							case'MD':
							default:navigator.clipboard.writeText(String(scrawl.x2m(scrawl.x2m(),'htm2md')).replaceAll(/\t/g,"\n"));
						}

						if(!this.NOTEPAD.childNodes[0]){

						const rang=document.createRange();
						if(pos){

						this.RANG.forEach((r,x)=>{
							const l=this.NOTEPAD.textContent.length;
							if(r>l){
								this.RANG[x]=l;
							}
						});
						rang.setStart(this.NOTEPAD.childNodes[0],this.RANG[0]);
						rang.setEnd(this.NOTEPAD.childNodes[0],this.RANG[1]);
						selec.removeAllRanges();
						selec.addRange(rang);
					}
					this.nix=(rec=true)=>{
						if(this.RANG[0]===this.RANG[1]){

							location.reload();
						}
					}
					this.raec=()=>{
						localStorage.Scrawl_TXT=this.NOTEPAD.textContent;
						if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
							let oldTxt=this.HISTRY['txt'].splice(this.HISTRY['indx']);
							let oldCart=this.HISTRY['cart'].splice(this.HISTRY['indx']);
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							oldTxt.pop();
							oldTxt.reverse();
							this.HISTRY['txt']=this.HISTRY['txt'].concat(oldTxt);
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							oldCart.pop();
							oldCart.reverse();
							this.HISTRY['cart']=this.HISTRY['cart'].concat(oldCart);
							this.HISTRY['indx']=this.HISTRY['txt'].length;
						}else{
							this.HISTRY['indx']++;
						}
						this.HISTRY['txt'][this.HISTRY['indx']]=this.NOTEPAD.textContent;
						this.HISTRY['cart'][this.HISTRY['indx']]=this.RANG;
						if(this.HISTRY['txt'].length>cfg('max_undo')){
							this.HISTRY['txt'].shift();

							const k=[...this.NOTEPAD.innerHTML.matchAll(rx)].length;
							this.NOTEPAD.innerHTML=this.NOTEPAD.innerHTML.replaceAll(rx,w[1]);
							this.raec();
							return'Replaced '+k+' occurrences . . .';
						}else{
							return'Cannot make changes while locked!';
						}
					}
					this.selmod=(reach='word')=>{
						window.getSelection().modify('move','backward',reach);
						window.getSelection().modify('extend','forward',reach);
						const rang=window.getSelection().getRangeAt(0);
						this.RANG=[rang.startOffset,rang.endOffset];
					}
					this.tally=()=>{
						let txt='';

						}
						const wurdz=txt.split(/ +/).length-1;

					}
					this.undo=(re=false)=>{
						if(this.NOTEPAD.contentEditable=='true'){

							if(re){
								if(this.HISTRY['indx']<(this.HISTRY['txt'].length-1)){
									this.HISTRY['indx']++;
									go=true;
								}
							}else{
								if(this.HISTRY['indx']>1){
									this.HISTRY['indx']--;
									go=true;
								}
							}
							if(go){
								this.NOTEPAD.textContent=this.HISTRY['txt'][this.HISTRY['indx']];

					this.x2m=(txt=localStorage.Scrawl_TXT,regx='md2htm')=>{
						if(regx==='md2htm'){
							let htm='';
							const mdarr=txt.split(/\n/g,);
							mdarr.forEach((line,i)=>{
								mdarr[i]=line.trim();
								switch(mdarr[i][0]){
									case'#':
										mdarr[i]=mdarr[i].replace(/^#\s*(.*)/g,'<h1>$1</h1>');
										break;
									case'>':
										mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<blockquote>$1</blockquote>');
										break;
									case'+':
										if(mdarr[i]=='+++'){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<h3>✶ ✶ ✶</h3>');
											break;
										}
									case'=':
										if(mdarr[i]=='==='){
											mdarr[i]=mdarr[i].replace(/^>\s*(.*)/g,'<hr>');
											break;
										}
									default:
										if(mdarr[i]==''){
											mdarr[i]='<br>';
										}else{
											mdarr[i]=mdarr[i].replace(/(.*)/g,'<p>$1</p>').replace(/<p><\/p>/g,'');
										}
								}
								this.REGX[regx][0].forEach((p,x)=>{
									mdarr[i]=mdarr[i].replace(p,this.REGX[regx][1][x]);
								});
								htm+=mdarr[i];
							});
							txt=htm;
						}else{
							this.REGX[regx][0].forEach((p,x)=>{
								txt=txt.replace(p,this.REGX[regx][1][x]);
							});
							if(regx==='htm2rtf'){
								txt='{\\rtf1\\ansi{\\info{\\author '+cfg('author')+'}{\\doccomm '+cfg('comment')+'}}'+txt+'}';

					this.xom=(txt='',x=true,rec=true)=>{
						if(this.NOTEPAD.contentEditable=='true'){
							this.NOTEPAD.textContent=this.NOTEPAD.textContent.slice(0,this.RANG[0])+txt+this.NOTEPAD.textContent.slice(this.RANG[1]).replace(/\s+$/,'')+' ';

								this.RANG=[this.RANG[0]+txt.length,this.RANG[0]+txt.length];

							}
						}

			// MAIN
			const SCRoPS={'Δ':0,'author':'Paige Turner','dark':false,'intro':true,'issu':'-1.0.13.X','max_undo':99,'promp':'	# ','webhook':'http://localhost/act.php','comment':'Scrawled with https://scrawl.cc/'};

				document.body.appendChild(moda);

			function big(){

				}

				if(!localStorage.Scrawl_CFG){

				}
				let cfg=JSON.parse(localStorage.Scrawl_CFG);
				if(ky){
					if(valu!=null){
						cfg[ky]=valu;
						localStorage.Scrawl_CFG=JSON.stringify(cfg);
					}else{
						return JSON.parse(localStorage.Scrawl_CFG)[ky];
					}
				}else{
					return cfg;
				}

					cfg('dark','true');

				const Formbody=new FormData();

			async function mkHand(naem){
				if(HAND===false){
					const opts={
						suggestedName:naem,
						types:[{
							description:'Markdown',
							accept:{
								'text/markdown':['.md']
							}
						},{
							description:'Plaintext',
							accept:{
								'text/plain':['.txt']
							}
						},{
							description:'HTML',
							accept:{
								'text/HTML':['.htm']
							}
						},{
							description:'Richtext',
							accept:{
								'application/rtf':['.rtf']
							}
						}]
					};
					HAND=await window.showSaveFilePicker(opts);
				}
				const fty=await HAND.getFile();
				const fty2=fty.name.split('.');
				const rtf=fty2[fty2.length-1];
				let md;
				if(rtf=='htm'){
					md=scrawl.x2m();
				}else{
					md=scrawl.x2m(scrawl.x2m(),'htm2'+rtf).replace(/\t/g,'');
				}
				const mime={'md':'text/markdown','htm':'text/html','txt':'text/plain','rtf':'application/rtf'};
				const bob=new Blob([md],{type:mime[rtf]+';charset=utf-8'});
				const pen=await HAND.createWritable();
				await pen.write(bob);
				await pen.close();
				alurt('Saved!');
			}

						scrawl.opin(ti);
					}
				}else{
					const f=document.createElement('input');
					f.type='file';
					f.setAttribute('accept','.docx,.htm,.html,.md,.txt');
					document.body.appendChild(f);
					f.style.display='none';
					f.click();
					f.onchange=()=>{
						const bin=f.files[0];
						scrawl.opin(bin);
					}
				}
			}

						spex();
					}
					scrawl.NOTEPAD.contentEditable='false';
					document.getElementById('ui-lox').children[0].classList.toggle('hid');
					document.getElementById('ui-lox').children[1].classList.toggle('hid');
					scrawl.NOTEPAD.innerHTML=scrawl.x2m();
				}else{
					scrawl.NOTEPAD.contentEditable='true';
					document.getElementById('ui-lox').children[0].classList.toggle('hid');
					document.getElementById('ui-lox').children[1].classList.toggle('hid');
					scrawl.NOTEPAD.textContent=localStorage.Scrawl_TXT;
					scrawl.NOTEPAD.focus();
					scrawl.cart();
				}
				scrawl.NOTEPAD.classList.toggle('locked');
			}
			// HEY, LISTEN!
			document.body.addEventListener('keydown',e=>{
				cement.style.display='none';
				if(e.ctrlKey||e.metaKey){
					if(e.key.toUpperCase()=='S'){
						e.preventDefault();
						if(e.shiftKey){
							saef(true);
						}else{
							saef();
						}
					}
					if(scrawl.NOTEPAD.contentEditable=='false'){
						if(e.key.toUpperCase()=='C'){
							e.preventDefault();
							if(e.shiftKey){
								scrawl.cop('BBC');
								alurt('Copied to clipboard . . . (BBC)');
							}else{
								scrawl.cop('HTML');
								alurt('Copied to clipboard . . . (HTML)');
							}
						}
					}
					switch(e.key.toUpperCase()){
						case'E':e.preventDefault();saen();break;
						case'F':e.preventDefault();hunt();break;
						case'H':e.preventDefault();saerk();break;
						case'K':e.preventDefault();scrawl.biu('~');break;
						case'L':e.preventDefault();spex();break;
						case'N':e.preventDefault();rush(naeu);break;
						case'O':e.preventDefault();opaen();break;
						case'Q':case'W':e.preventDefault();rush(window.close);break;
						case'T':e.preventDefault();alurt(scrawl.tally());break;
						case'Y':e.preventDefault();scrawl.undo(true);break;
						case'Z':e.preventDefault();scrawl.undo();break;
						case'=':case'-':case'_':case'+':e.preventDefault();break;
					}
				}else{
					switch(e.key){
						case'Tab':e.preventDefault();swop();break;
						// case'Enter':e.preventDefault();swop();const l=localStorage.Scrawl_TXT.length;scrawl.RANG=[l,l];scrawl.xom("\n\t");window.scrollTo(0,document.body.scrollHeight);break;
						case'F7':e.preventDefault();spex();break;
						case'F8':e.preventDefault();saerk();break;
						case'F9':e.preventDefault();dark();break;
						case'F10':e.preventDefault();ops();break;
						case'F12':e.preventDefault();saen();break;
					}
				}
		});
		document.body.onscroll=()=>{
			cement.style.display='none';
		}
		document.body.parentElement.ondragover=(e)=>{
			e.preventDefault();
		}
		document.body.parentElement.ondrop=(e)=>{
			e.preventDefault();
			opaen(e.dataTransfer.items[0].getAsFile());
		}
		window.addEventListener('beforeprint',e=>{
			if(scrawl.NOTEPAD.contentEditable=='true'){
				swop();
			}
		});
		document.body.onclick=(e)=>{
			cement.style.display='none';
		}
		scrawl.NOTEPAD.oncontextmenu=(e)=>{
			if(scrawl.NOTEPAD.contentEditable=='true'){
				if(scrawl.RANG[0]===scrawl.RANG[1]){
					scrawl.selmod();
				}
				cement.style.display='block';
				cement.style.left=(e.clientX+64)+'px';
				cement.style.top=(e.clientY+24)+'px';
			}
		}
		scrawl.NOTEPAD.ondblclick=(e)=>{
			scrawl.selmod('sentence');
		}
		// INIT
		if(cfg('dark')=='true'){
			document.body.parentElement.classList.toggle('day');
			document.querySelector("meta[name=theme-color]").setAttribute("content",'#222');
		}
		spex();
		if(cfg('intro')==true){
			cfg('intro','false');
			localStorage.Scrawl_TXT="# Scrawl\n\nIs a simple *Markdown* editor for writers. It lacks many features on purpose, including the majority of the *Markdown* syntax itself! I developed it specifically for my own use as a distraction-free typewriter.\n\n\n# Header\n===\n+++\n**Bold**\n*Italic*\n~Strikethrough~\n_Underline_\n\"Double quotes\"\n`Single quotes/apostrophes'";
		}
		if(localStorage.Scrawl_TXT!=cfg('promp')){
			swop();
		}
		scrawl.NOTEPAD.setAttribute('spellcheck','false');
		setTimeout(()=>{window.scrollTo(0,0);const l=localStorage.Scrawl_TXT.length;scrawl.RANG=[l,l]},1000);
		document.body.style.opacity=1;
		if('serviceWorker'in navigator){
			navigator.serviceWorker.register('work.js');
		}
		</script>
	</body>
</html>
