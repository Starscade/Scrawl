<!DOCTYPE html>
<html lang="en"class="day"oncontextmenu="return false">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="apple-mobile-web-app-capable"content="yes">
		<meta name="mobile-web-app-capable"content="yes">
		<meta name="theme-color"content="#222">
		<link rel="apple-touch-icon"href="ico.png">
		<link rel="icon"href="ico.png"type="image/png"sizes="192x192">
		<title>S c r a w l</title>
		<style>
			
		</style>
	</head>
	<body>
		<main>
			<article><button>GO</button></article>
		</main>
		<script>
			'use strict';
			const butt=document.getElementsByTagName('button');
			function unreg(){
				let serv='';
				if('serviceWorker'in navigator){
					navigator.serviceWorker.getRegistrations().then(
						function(registrations){
							for(let registration of registrations){
								/* if(registration.active.scriptURL=='http://localhost/my-push/myworker.js'){registration.unregister();} */
								serv+=registration.active.scriptURL+"\n";
								registration.unregister();
							}
						});
				}
			}
			butt.onclick=()=>{
				unreg();
			}
		</script>
	</body>
</html>
