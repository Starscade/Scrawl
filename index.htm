<!DOCTYPE html>
<html lang="en"oncontextmenu="return false">
	<head>
		<meta charset="utf-8">
		<meta name="viewport"content="initial-scale=1,maximum-scale=1,user-scalable=no,width=device-width">
		<meta name="apple-mobile-web-app-capable"content="yes">
		<meta name="mobile-web-app-capable"content="yes">
		<meta name="theme-color"content="#222">
		<link rel="apple-touch-icon"href="ico.png">
		<link rel="icon"href="ico.png"type="image/png"sizes="192x192">
		<title>S c r a w l</title>
		<style>
			@font-face{
				font-family:'Font';
				src:url('https://fonts.gstatic.com/s/baloo2/v9/wXK0E3kTposypRydzVT08TS3JnAmtdgazZpo_lc.woff2');
			}
			@keyframes pop{
				from{
					outline-offset:0;
				}to{
					outline-offset:2pt;
					outline-color:transparent;
				}
			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--fg);
				border-radius:var(--rad);
				border:4pt solid var(--bg);
			}::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#222;
				--fg:#eca;
				--hi:currentColor;
				--mg:#444;
				/* --no:Firebrick; */
				--ok:DodgerBlue;
				--pg:#333;
				--pt:18pt;
				--font:'Font',sans-serif;
				--bord:var(--thicc) solid;
				--rad:calc(var(--pt)/3);
				--thicc:2pt;
				cursor:cell;
				scroll-behavior:smooth;
				scrollbar-color:var(--pg)var(--bg);
				scrollbar-width:thin;
				text-align:center;
				user-select:none;
			}
			a{
				border-bottom:2pt dotted;
				color:currentColor;
				text-decoration:none;
			}a[target="_Blank"]::after{
				content:'◥';
				font-size:50%;
				vertical-align:super;
			}a:hover{
				border-bottom-style:solid;
			}
			article{
				border-radius:var(--rad);
				cursor:text;
				line-height:150%;
				margin:auto auto 1em auto;
				max-width:7.5in;
				min-height:80vh;
				padding:2em;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			blockquote{
				font-style:italic;
				margin:0;
				text-align:center;
			}
			body{
				background-color:var(--bg);
				color:var(--fg);
				font-family:var(--font);
				font-size:var(--pt);
				opacity:0;
			}body,h1,h3,p{
				margin:0;
			}body,nav{
				transition:opacity .5s;
			}
			h1{
				font-size:100%;
				font-variant:small-caps;
				letter-spacing:3pt;
				margin:auto;
				/* max-width:19ch; */
				/* text-transform:uppercase; */
			}h1,h3{
				text-align:center;
			}
			h3{
				font-size:67%;
				letter-spacing:1.34em;
			}
			hr{
				background-image:linear-gradient(to right,transparent,var(--fg),transparent);
				border:none;
				height:2pt;
			}
			p:not(br+p,p:first-of-type){
				text-indent:2em;
			}/* p:first-of-type::first-letter{
				float:left;
				font-size:270%;
				margin-right:.1em;
				margin-top:.38em;
			}p:first-of-type::first-line{
				font-variant:small-caps;
				font-weight:bold;
				letter-spacing:2pt;
			} */
			nav{
				background-color:var(--bg);
				bottom:0;
				box-shadow:0 -1em 1em var(--bg);
				overflow-x:auto;
				padding-top:.5em;
				position:fixed;
				white-space:nowrap;
				width:100%;
			}nav:hover{
				opacity:1;
			}nav span{
				display:inline-block;
				height:24px;
				padding:.5em;
				width:24px;
			}nav span:not(.notouch){
				cursor:pointer;
			}nav span:not(.notouch):hover{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
			}
			svg{
				fill:currentColor;
				height:24px;
				width:24px;
			}
			.alurt{
				animation:pop 1s forwards;
				background-color:var(--fg);
				border:2pt solid var(--bg);
				border-radius:var(--rad);
				color:var(--bg);
				cursor:pointer;
				left:50%;
				outline:3pt solid var(--fg);
				padding:.33em .66em .33em .66em;
				position:fixed;
				top:11%;
				transform:translateX(-50%);
				transition:opacity 1s;
				user-select:none;
				white-space:pre;
				z-index:10;
			}
			.blu article{
				border-color:var(--ok);
			}.blu #ui-spex{
				color:var(--ok);
			}
			.day{
				--bg:#ddd;
				--fg:#667;
				--mg:#bbb;
				--pg:#eee;
			}
			.hid{
				display:none;
			}
			.locked{
				border-color:var(--mg);
				cursor:not-allowed;
				text-align:justify;
			}
			.notouch{
				opacity:.33;
			}
			@media(orientation:landscape){
				article{
					background-color:var(--pg);
					border:var(--bord);
					margin-bottom:10vh;
					margin-top:10vh;
					padding:1in;
				}
				nav{
					bottom:auto;
					box-shadow:0 1em 1em var(--bg);
					opacity:0;
					top:0;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--mg:transparent;
					--pg:transparent;
				}
				article{
					margin:0;
					padding:0;
				}
				nav,.alurt{
					display:none;
				}
				/* p:first-of-type::first-letter{
					margin-top:.4em;
				} */
			}
			@page{
				margin:1in;
			}
		</style>
	</head>

		<script>
			'use strict';
			const butt=document.getElementsByTagName('button');
			function unreg(){
				let serv='';
				if('serviceWorker'in navigator){
					navigator.serviceWorker.getRegistrations().then(
						function(registrations){
							for(let registration of registrations){
								/* if(registration.active.scriptURL=='http://localhost/my-push/myworker.js'){registration.unregister();} */
								serv+=registration.active.scriptURL+"\n";
								registration.unregister();
							}
						});
				}
			}
			butt.onclick=()=>{
				unreg();
			}
		</script>
