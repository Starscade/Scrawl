			}
			::-webkit-scrollbar{
				height:var(--rad)*2;
				width:var(--rad)*2;
			}::-webkit-scrollbar-thumb{
				background-color:var(--fg);
				border-radius:var(--rad);
				border:4pt solid var(--bg);
			}
			::selection{
				background-color:var(--fg);
				color:var(--bg);
			}
			:root{
				--bg:#333;
				--fg:#eca;
				--pt:18pt;
				--font:'Font',sans-serif;
				--rad:calc(var(--pt)/3);
				background-color:var(--bg);
				color:var(--fg);
				cursor:crosshair;
				font-family:var(--font);
				font-size:var(--pt);
				scrollbar-width:thin;
				scroll-behavior:smooth;
				text-align:center;
				user-select:none;
			}
			article{
				cursor:text;
				line-height:150%;
				margin:10vh auto 10vh auto;
				max-width:8.5in;
				padding:1em;
				text-align:left;
				white-space:pre-wrap;
			}article:focus{
				outline:none;
			}
			body{
				margin:0;
				opacity:0;
				transition:1s opacity;
			}
			h1{
				font-size:100%;
				font-weight:normal;
				text-align:center;
				text-transform:uppercase;
			}h1,p{
				margin:0;
			}
			nav{
				background-color:var(--bg);
				position:fixed;
			}
			p:not(br+p){
				text-indent:2em;
			}
			svg{
				cursor:pointer;
				fill:currentColor;
				height:1em;
				padding:1em;
				width:1em;
			}svg:hover{
				background-color:currentColor;
				fill:var(--bg);
			}
			.alurt{
				background-color:var(--fg);
				border-radius:var(--rad);
				color:var(--bg);
				cursor:pointer;
				left:50%;
				min-width:6em;
				padding:.33em .66em .33em .66em;
				position:fixed;
				top:11%;
				transform:translateX(-50%);
				transition:opacity .5s;
				user-select:none;
				white-space:pre;
				z-index:10;
			}
			.day{
				--bg:#ddd;
				--fg:#667;
			}
			.glass{
				opacity:0;
			}
			.hid{
				display:none;
			}
			.lokc{
				cursor:not-allowed;
				text-align:justify;
			}
			#contex{
				display:none;
				padding:0;
				transform:translateX(0);
				white-space:normal;
			}#contex span{
				display:none;
			}#contex svg{
				border-radius:0;
			}#contex svg:hover{
				fill:var(--fg);
			}#contex svg:first-of-type:hover{
				border-radius:var(--rad) 0 0 var(--rad);
			}#contex svg:last-of-type:hover{
				border-radius:0 var(--rad) var(--rad) 0;
			}
			#moab{
				bottom:0;
				display:none;
				height:auto;
				top:auto;
				width:100%;
			}
			#tooble{
				bottom:0;
				display:flex;
				flex-direction:column;
				justify-content:space-between;
				top:0;
				transition:.33s opacity;
			}#tooble:hover{
				opacity:1;
			}#tooble div{
				display:inline;
			}#tooble svg{
				border-radius:0 1em 1em 0;
				display:block;
			}
			@media(orientation:portrait){
				article{
					margin-bottom:4em;
					margin-top:2em;
				}
				svg:hover{
					background-color:transparent;
					fill:currentColor;
				}
				#contex span{
					display:inline;
				}
				#moab{
					display:block;
				}
				#tooble{
					bottom:3em;
					display:none;
					opacity:1;
					top:auto;
					width:100%;
				}#tooble.peek{
					display:block;
				}#tooble svg{
					display:inline;
				}
			}
			@media print{
				:root{
					--bg:White;
					--fg:Black;
					--pt:12pt;
					--font:serif;
				}
				article{
					line-height:200%;
					margin:0;
					padding:0;
				}
				h1{
					font-variant:small-caps;
					letter-spacing:1pt;
					text-transform:none;
				}
				nav,.alurt{
					display:none!important;
				}
			}
			@page{
				margin:1in;
			}
		</style>

		<script>
			'use strict';
			// Scrawl
			class Jig{
				constructor(nib=new Nib()){
					this.CFG={'dark':false,'post_alias':'','post_url':'http://localhost/act.php','promp':'	# ','word_url':'https://www.merriam-webster.com/thesaurus/'};
					this.HAND=false;
					this.cfg=(ky,valu)=>{
						if(!localStorage.Scrawl_CFG){
							this.mem(this.CFG);
						}
						const cfg=this.mem();
						if(ky){
							if(valu!=null){
								cfg[ky]=valu;
								this.mem(cfg);
							}else{
								return cfg[ky];
							}
						}else{
							if(JSON.stringify(cfg)!==JSON.stringify(this.CFG)){
								Object.keys(this.CFG).forEach((i,x)=>{
									if(!(i in cfg)){
										cfg[i]=this.CFG[i];
									}
								});
								Object.keys(cfg).forEach((i,x)=>{
									if(!(i in this.CFG)){
										delete cfg[i];
									}
								});
								this.mem(cfg);
							}
							// console.log(cfg);
							return cfg;
						}
					}
					this.gurl=async (bob='',naem=nib.sellama(),url=this.cfg('post_url'))=>{
						return await new Promise((ok,no)=>{
							const Formbody=new FormData();
							Formbody.append(0,bob,naem);
							fetch(url,{
								method:'POST',
								body:Formbody
							}).then(resp=>{
								ok(resp.text());
							}).catch(err=>{
								no('Failed');
							})
						});
						const Formbody=new FormData();
						Formbody.append(0,bob,naem);
						fetch(url,{
							method:'POST',
							body:Formbody
						}).then(
							resp=>resp.text()
						).then(
							resp=>{
								console.log(resp);
								return resp
							}
						);
					}
					this.lod=(F)=>{
						const raed=new FileReader();
						raed.readAsText(F);
						raed.onload=()=>{
							const dot=F.name.split('.');
							if(dot[dot.length-1]=='md'){
								nib.memry(nib.x2y(nib.x2y(raed.result),'htm2md'));
							}else{
								nib.memry(nib.x2y(raed.result,'htm2md'));
							}
							this.cfg('post_alias','');
							location.reload();
						}
					}
					this.mem=(json)=>{
						if(json){
							localStorage.Scrawl_CFG=JSON.stringify(json);
						}
						return JSON.parse(localStorage.Scrawl_CFG);
					}
					this.neu=()=>{
						nib.memry(this.cfg('promp'));
						this.cfg('post_alias','');
						location.reload();
					}
					this.pub=()=>{
						let alias=nib.sellama();
						if(this.cfg('post_alias').trim()){
							alias=this.cfg('post_alias');
						}
						let issu=window.prompt('Publish . . .',alias);
						if(issu){
							if(issu===' '){
								issu=nib.sellama();
								this.cfg('post_alias','');
							}
							if(issu!==nib.sellama()){
								this.cfg('post_alias',issu);
							}
							return this.gurl(new Blob([nib.x2y()]),issu,this.cfg('post_url'));
						}
					}
					this.sav=async (as=false)=>{
						return await new Promise((ok,no)=>{
							let naem=nib.sellama();
							if('showSaveFilePicker'in window){
								if(as){
									this.HAND=false;
								}
								const that=this;
								(async function (naem,that){
									if(that.HAND===false){
										const ops={
											suggestedName:naem,
											excludeAcceptAllOption:true,
											types:[{
												description:'Markdown',
												accept:{
													'text/markdown':['.md']
												}
											},{
												description:'HTML',
												accept:{
													'text/html':['.htm']
												}
											},{
												description:'Plaintext',
												accept:{
													'text/plain':['.txt']
												}
											}]
										};
										that.HAND=await window.showSaveFilePicker(ops);
									}
									const f=await that.HAND.getFile();
									const fn=f.name.split('.');
									const fx=fn[fn.length-1];
									let txt;
									switch(fx.toLowerCase()){
										case'htm':txt=nib.x2y();break;
										case'md':txt=nib.x2y(nib.x2y(),'htm2md').replaceAll(/\t/g,'');break;
										default:txt=nib.x2y(nib.x2y(),'htm2md');
									}
									const maem={'htm':'text/html','md':'text/markdown','txt':'text/plain'};
									const bob=new Blob([txt],{type:maem[fx]+';charset=utf-8'});
									const pen=await that.HAND.createWritable();
									await pen.write(bob);
									await pen.close();
								})(naem,that).then(resp=>{
									ok('Saved');
								}).catch(err=>{
									no('Error');
								});
							}else{
								const txt=nib.x2y(nib.x2y(),'htm2md').replace(/\t/g,'');
								const bob=new Blob([txt],{type:'text/markdown;charset=utf-8'});
								const uri=window.URL.createObjectURL(bob);
								const a=document.createElement('a');
								document.body.appendChild(a);
								a.style='display:none';
								a.href=uri;
								a.download=naem+'.md';
								a.click();
								a.remove();
								window.URL.revokeObjectURL(uri);
							}
						});
					}
					this.spex=()=>{
						if(nib.NOTEPAD.spellcheck==true){
							nib.NOTEPAD.setAttribute('spellcheck','false');
						}else{
							nib.NOTEPAD.setAttribute('spellcheck','true');
							nib.autypo();
						}
					}
					// INIT
					this.cfg();
				}
			}
			class Nib{
				constructor(notepad=document.getElementsByTagName('article')[0]){
					this.NOTEPAD=notepad;
					this.NOTEPAD.contentEditable=true;
					this.NOTEPAD.spellcheck=false;
					this.HISTRY={'txt':[' '],'indx':0,'cart':[[0,0]]};
					this.RANG=[0,0];
